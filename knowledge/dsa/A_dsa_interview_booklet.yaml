id: dsa_interview_booklet
title: DSA Interview Prep Across Languages
type: booklet
category: dsa
languages:
  - python
  - cpp
  - java
goal: A chapter-wise DSA interview prep map for quickly switching into a new interview language.

chapters:
  - id: quick_revision
    title: Quick Revision
    description: A focused route for someone who already knows DSA and wants to interview confidently in a different language.
    sections:
      - title: Language Readiness
        lessons:
          - title: Syntax Readiness For Interviews
            file: knowledge/dsa/quick_revision/language_readiness/syntax_readiness.yaml
            description: Loops, functions, classes, imports, lambdas, and common boilerplate.
          - title: Input Parsing Across Languages
            file: knowledge/dsa/quick_revision/language_readiness/input_parsing_across_languages.yaml
            description: Fast, reliable input parsing in Python, C++, and Java.
          - title: Print And Debug Quickly
            file: knowledge/dsa/quick_revision/language_readiness/print_debug_quickly.yaml
            description: How to inspect arrays, maps, pairs, objects, and nested structures fast.
          - title: Common Built-ins Cheat Sheet
            file: knowledge/dsa/quick_revision/language_readiness/common_builtins_cheat_sheet.yaml
            description: The methods and library calls most likely needed in interviews.

      - title: Containers And Patterns
        lessons:
          - title: STL vs Collections
            file: knowledge/dsa/quick_revision/containers_and_patterns/stl_vs_collections.yaml
            description: Existing comparison lesson for C++, Python, and Java containers.
          - title: Array List Vector Readiness
            file: knowledge/dsa/quick_revision/containers_and_patterns/arrays_lists_vectors.yaml
          - title: HashMap Dictionary Readiness
            file: knowledge/dsa/quick_revision/containers_and_patterns/hashmap_dictionary.yaml
          - title: Stack Queue Deque Readiness
            file: knowledge/dsa/quick_revision/containers_and_patterns/stack_queue_deque.yaml
          - title: Sorting Comparator Readiness
            file: knowledge/dsa/quick_revision/containers_and_patterns/sorting_comparators.yaml

      - title: Must-Know Patterns
        lessons:
          - title: Two Pointers
            file: knowledge/dsa/quick_revision/must_know_patterns/two_pointers.yaml
          - title: Sliding Window
            file: knowledge/dsa/quick_revision/must_know_patterns/sliding_window.yaml
          - title: Binary Search
            file: knowledge/dsa/quick_revision/must_know_patterns/binary_search.yaml
          - title: BFS And DFS Readiness
            file: knowledge/dsa/quick_revision/must_know_patterns/bfs_dfs_readiness.yaml
          - title: Dynamic Programming Readiness
            file: knowledge/dsa/quick_revision/must_know_patterns/dynamic_programming_readiness.yaml

      - title: Final Interview Readiness
        lessons:
          - title: Top 50 Interview Moves
            file: knowledge/dsa/quick_revision/final_interview_readiness/top_50_interview_moves.yaml
            status: planned
          - title: Mistakes When Switching Languages
            file: knowledge/dsa/quick_revision/final_interview_readiness/language_switching_mistakes.yaml
            status: planned
          - title: Last-Minute Complexity Table
            file: knowledge/dsa/quick_revision/final_interview_readiness/last_minute_complexity_table.yaml
            status: planned
          - title: Mock Interview Checklist
            file: knowledge/dsa/quick_revision/final_interview_readiness/mock_interview_checklist.yaml
            status: planned

  - id: foundations
