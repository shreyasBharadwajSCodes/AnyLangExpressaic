          - title: Class And Helper Design
            file: knowledge/dsa/foundations/interview_implementation_basics/class_helper_design.yaml
          - title: Error-Prone Edge Cases
            file: knowledge/dsa/foundations/interview_implementation_basics/edge_cases.yaml
