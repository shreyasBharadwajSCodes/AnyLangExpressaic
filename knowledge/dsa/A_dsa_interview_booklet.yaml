            description: References, mutability, hashing, lists, dicts, sets, and iteration costs.
          - title: C++ Internal Mechanics
            file: knowledge/dsa/foundations/language_thinking_mechanics/cpp_internal_mechanics.yaml
            description: Values, references, iterators, STL containers, allocation, and invalidation.
          - title: Java Internal Mechanics
            file: knowledge/dsa/foundations/language_thinking_mechanics/java_internal_mechanics.yaml
            description: Objects, references, generics, collections, equality, and hashing.
          - title: Equality And Identity
            file: knowledge/dsa/foundations/language_thinking_mechanics/equality_identity.yaml
          - title: Mutability Traps
            file: knowledge/dsa/foundations/language_thinking_mechanics/mutability_traps.yaml
