            file: knowledge/dsa/foundations/complexity_and_cost_models/time_complexity.yaml
            description: Big-O, hidden constants, amortized costs, and language-specific runtime costs.
          - title: Space Complexity Discussions
            file: knowledge/dsa/foundations/complexity_and_cost_models/space_complexity.yaml
            description: Extra memory, recursion stack, object overhead, and container overhead.
          - title: Amortized Analysis
            file: knowledge/dsa/foundations/complexity_and_cost_models/amortized_analysis.yaml
          - title: Recursion Stack Cost
            file: knowledge/dsa/foundations/complexity_and_cost_models/recursion_stack_cost.yaml
