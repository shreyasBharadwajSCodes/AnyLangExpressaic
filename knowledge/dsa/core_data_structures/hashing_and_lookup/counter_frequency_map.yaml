id: counter_frequency_map
title: Counter / Frequency Map
category: dsa
level: beginner_to_intermediate
languages: [python, cpp, java]
tags: [counter, frequency_map, hashmap, interview]
goal: Teach frequency maps across Python, C++, and Java with clear tracking of current value, count changes, distinct count, and zero-removal logic.
assets:
  frequency_tracker:
    type: image
    path: assets/dsa/counter_frequency_map/frequency-tracker.png
    alt: Current value x updating freq[x], distinct count, and max frequency.
lesson:
  - explain:
      title: Solve
      body: >
        Solve: Given a collection of values, solve membership, grouping, counting, or complement lookup
        using stable keys.
  - compare_table:
      title: When Should This Come To Mind?
      columns:
        - When The Problem Looks Like This
        - Reach For
        - First Coding Move
      rows:
        -
          - "If your interviewer asks about existence, duplicates, grouping, frequency, complements, or fastest lookup."
          - "A strong first thought is hash map, hash set, frequency map, compound key, or heap over counts."
          - "Choose the key carefully and say whether the state stores count, first index, last index, or existence."
        -
          - "Order is not the main requirement, but identity or counts are."
          - ""
          - ""
        -
          - "A scan with a map or set removes an inner loop."
          - ""
          - ""
  - explain:
      title: Frequency Strategy
      body: >
        A frequency map tracks how many times each value appears. Watch x, freq[x],
        distinct, and best_count. In sliding windows, the outgoing value must be
        decremented just as carefully as the incoming value is incremented.
  - explain:
      title: Method Strategy
      body: >
        Frequency-map methods maintain counts as state changes. The strategy is to
        update incoming and outgoing values symmetrically, and to decide whether
        zero-count keys should stay or be removed. If distinct count matters, zero
        keys usually must be removed.

  - compare_table:
      title: Frequency Tools
      columns: [Operation Needed, Python, C++, Java]
      rows:
        - ["Count all", "Counter", "unordered_map<T,int>", "HashMap<T,Integer>"]
        - ["Increment", "freq[x]+=1", "freq[x]++", "put/getOrDefault"]
        - ["Default zero", "get(x,0)", "operator[]", "getOrDefault"]
        - ["Remove zero", "del freq[x]", "erase(x)", "remove(x)"]
  - language_lens:
      language: python
      title: Python Strategy
      body: Counter is compact; dict with get is clearer when you must control zero deletion.
      default_instincts:
        - Use dict/set when key identity is clear and hashable.
        - Use tuple keys for immutable compound state.
        - Delete zero-count keys when active distinct count matters.
      behind_the_scenes: ["Counter can keep zero or negative counts.", "Deleting zero-count keys keeps distinct logic clean."]
      avoid:
        - Using mutable list or dict as a key.
        - Assuming dict or set order is sorted.
        - Keeping zero counts when len(freq) is used as state.
  - language_lens:
      language: cpp
      title: C++ Strategy
      body: unordered_map[x]++ is convenient because missing keys become zero first.
      default_instincts:
        - Use unordered_map/set for average lookup and map/set for sorted keys.
        - Use find/count when you do not want insertion.
        - Design custom hashes for compound keys deliberately.
      behind_the_scenes: ["operator[] inserts.", "Use erase when count becomes zero if distinct keys matter."]
      avoid:
        - Using operator[] only to check existence.
        - Forgetting unordered containers need hash support for custom keys.
        - Assuming unordered_map iteration order is stable.
  - language_lens:
      language: java
      title: Java Strategy
      body: Use getOrDefault, merge, or compute; keep zero-removal explicit for window problems.
      default_instincts:
        - Use HashMap/HashSet with equals and hashCode aware keys.
        - Use getOrDefault for counts and remove for zero counts.
        - Use records or immutable classes for compound keys when possible.
      behind_the_scenes: ["Integer counts are boxed.", "get returns null if absent."]
      avoid:
        - Using == for object or String content equality.
        - Mutating fields used by hashCode after insertion.
        - Forgetting get can return null.
examples:
  - code_compare:
      title: Count Frequencies
      idea: Build freq from nums.
      python: |
        freq = {}

        for x in nums:
            # Read missing x as 0, then store the incremented count.
            freq[x] = freq.get(x, 0) + 1
      cpp: |
        unordered_map<int, int> freq;

        // operator[] inserts missing x with value 0, then increments it.
        for (int x : nums) freq[x]++;
      java: |
        Map<Integer, Integer> freq = new HashMap<>();

        for (int x : nums) {
            // getOrDefault avoids null when x appears for the first time.
            freq.put(x, freq.getOrDefault(x, 0) + 1);
        }
  - code_compare:
      title: Decrement Window Count
      idea: Remove outgoing value cleanly.
      python: |
        # out is leaving the active window, so its count must shrink.
        freq[out] -= 1

        # Removing zero keeps len(freq) equal to active distinct count.
        if freq[out] == 0:
            del freq[out]
      cpp: |
        // Prefix decrement gives the count after removing out.
        if (--freq[out] == 0) freq.erase(out);
      java: |
        // Compute the count after removing out from the active window.
        int next = freq.get(out) - 1;

        if (next == 0) freq.remove(out);
        else freq.put(out, next);
transitions:
  python_to_cpp:
    title: Python Counter to C++ frequency map
    mindset_shift: [From get defaults to operator insertion.]
    habit_swaps:
      - python: "freq.get(x, 0) + 1"
        cpp: "freq[x]++"
    false_friends:
      - term: read
        warning: C++ freq[x] inserts x.
  python_to_java:
    title: Python Counter to Java HashMap counts
    mindset_shift: [From direct arithmetic to getOrDefault/put.]
    habit_swaps:
      - python: "freq[x] = freq.get(x, 0) + 1"
        java: "freq.put(x, freq.getOrDefault(x, 0) + 1)"
    false_friends:
      - term: null
        warning: Java get can return null for missing keys.
interview_questions:
  - question: When should zero-count keys be removed?
    answer: When distinct-key count or exact active-window contents matter.
revision:
  quick_summary:
    - "Counter / Frequency Map is a data-structure topic: know what the structure stores, which operation it makes cheap, and what caveat can break a solution."
    - "Interview working idea: Frequency maps track counts. Window counts need increment and decrement symmetry."
  cheat_table:
    title: Frequency Cheat Table
    columns: [Operation Needed, Python, C++, Java]
    rows:
      - ["increment", "get + 1", "freq[x]++", "getOrDefault + put"]
      - ["remove zero", "del", "erase", "remove"]
  flashcards:
    - question: What does distinct count track?
      answer: Keys with positive counts.
notes:
  - In dry runs, write freq after each incoming and outgoing value.
tlm_hooks:
  possible_tasks: [generate_frequency_drills, trace_window_counts]
  context: Focus on count-changing variables and zero-removal logic.
