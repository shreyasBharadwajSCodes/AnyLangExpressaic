id: hashset_set
title: Set / HashSet / unordered_set
category: dsa
level: beginner_to_intermediate
languages: [python, cpp, java]
tags: [set, hashset, unordered_set, lookup, interview]
goal: Teach set usage across Python, C++, and Java with clear tracking of seen values, membership checks, duplicates, and hashability.
assets:
  set_membership_tracker:
    type: image
    path: assets/dsa/hashset_set/set-membership-tracker.png
    alt: Current value x checked against seen set, then inserted.
lesson:
  - explain:
      title: Solve
      body: >
        Solve: Given a collection of values, solve membership, grouping, counting, or complement lookup
        using stable keys.
  - compare_table:
      title: When Should This Come To Mind?
      columns:
        - When The Problem Looks Like This
        - Reach For
        - First Coding Move
      rows:
        -
          - "   asks about existence, duplicates, grouping, frequency, complements, or fastest lookup."
          - " hash map, hash set, frequency map, compound key, or heap over counts."
          - "Choose the key carefully and say whether the state stores count, first index, last index, or existence."
        -
          - "Order is not the main requirement, but identity or counts are."
          - ""
          - ""
        -
          - "A scan with a map or set removes an inner loop."
          - ""
          - ""
  - explain:
      title: Set Strategy
      body: >
        A set answers "have I seen this before?" Track x as the current value,
        seen as all accepted or visited values so far, and duplicate_found or answer
        as the output affected by membership.
  - explain:
      title: Method Strategy
      body: >
        Set methods answer membership questions. The strategy is to define what seen
        means at the exact moment of the check: already processed values, active
        window values, visited graph nodes, or forbidden states. Check-before-add and
        add-before-check solve different problems.

  - compare_table:
      title: Set Operations
      columns: [Operation Needed, Python, C++, Java]
      rows:
        - ["Create", "set()", "unordered_set<T>", "HashSet<T>"]
        - ["Contains", "x in seen", "seen.count(x)", "seen.contains(x)"]
        - ["Add", "seen.add(x)", "seen.insert(x)", "seen.add(x)"]
        - ["Remove", "seen.remove/discard", "seen.erase(x)", "seen.remove(x)"]
  - language_lens:
      language: python
      title: Python Strategy
      body: Use set for average O(1) membership; elements must be hashable.
      default_instincts:
        - Use dict/set when key identity is clear and hashable.
        - Use tuple keys for immutable compound state.
        - Delete zero-count keys when active distinct count matters.
      behind_the_scenes: ["list is unhashable.", "tuple works if its contents are hashable."]
      avoid:
        - Using mutable list or dict as a key.
        - Assuming dict or set order is sorted.
        - Keeping zero counts when len(freq) is used as state.
  - language_lens:
      language: cpp
      title: C++ Strategy
      body: unordered_set gives average O(1); set gives sorted O(log n).
      default_instincts:
        - Use unordered_map/set for average lookup and map/set for sorted keys.
        - Use find/count when you do not want insertion.
        - Design custom hashes for compound keys deliberately.
      behind_the_scenes: ["Custom compound keys need a hash for unordered_set.", "Iteration order is unspecified."]
      avoid:
        - Using operator[] only to check existence.
        - Forgetting unordered containers need hash support for custom keys.
        - Assuming unordered_map iteration order is stable.
  - language_lens:
      language: java
      title: Java Strategy
      body: HashSet uses hashCode and equals; custom keys need both.
      default_instincts:
        - Use HashMap/HashSet with equals and hashCode aware keys.
        - Use getOrDefault for counts and remove for zero counts.
        - Use records or immutable classes for compound keys when possible.
      behind_the_scenes: ["HashSet<Integer> boxes ints.", "LinkedHashSet preserves insertion order if needed."]
      avoid:
        - Using == for object or String content equality.
        - Mutating fields used by hashCode after insertion.
        - Forgetting get can return null.
examples:
  - code_compare:
      title: Contains Duplicate
      idea: Use seen to detect repeated values.
      python: |
        seen = set()

        for x in nums:
            # Check before adding: seen only contains earlier values.
            if x in seen:
                return True

            seen.add(x)
      cpp: |
        unordered_set<int> seen;

        for (int x : nums) {
            // count(x) checks membership without inserting x.
            if (seen.count(x)) return true;

            seen.insert(x);
        }
      java: |
        Set<Integer> seen = new HashSet<>();

        for (int x : nums) {
            // contains checks earlier values; add happens after the check.
            if (seen.contains(x)) return true;

            seen.add(x);
        }
transitions:
  python_to_cpp:
    title: Python set to C++ unordered_set
    mindset_shift: [From flexible hashable objects to typed keys and custom hashes.]
    habit_swaps:
      - python: "x in seen"
        cpp: "seen.count(x)"
    false_friends:
      - term: order
        warning: unordered_set is not sorted or insertion-ordered.
  python_to_java:
    title: Python set to Java HashSet
    mindset_shift: [From __hash__/__eq__ to hashCode/equals.]
    habit_swaps:
      - python: "seen.add(x)"
        java: "seen.add(x)"
    false_friends:
      - term: custom key
        warning: Java custom keys need equals and hashCode.
interview_questions:
  - question: What does seen mean in duplicate detection?
    answer: It contains values already processed before the current x.
revision:
  quick_summary:
    - "Set / HashSet / unordered_set is a data-structure topic: know what the structure stores, which operation it makes cheap, and what caveat can break a solution."
    - "Interview working idea: Set lookup is average O(1). Track seen before insertion. Custom keys need stable hashing."
  cheat_table:
    title: Set Cheat Table
    columns: [Operation Needed, Python, C++, Java]
    rows:
      - ["contains", "x in seen", "seen.count(x)", "seen.contains(x)"]
      - ["add", "add", "insert", "add"]
  flashcards:
    - question: Can Python list be in a set?
      answer: No, it is unhashable.
notes:
  - "Define what seen means: processed values, active window values, or visited nodes."
tlm_hooks:
  possible_tasks: [generate_set_drills, explain_seen_tracker]
  context: Focus on membership variables and hash/equality caveats.
