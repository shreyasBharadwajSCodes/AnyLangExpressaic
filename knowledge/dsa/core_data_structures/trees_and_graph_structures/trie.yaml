id: trie
title: Trie
category: dsa
level: intermediate
languages: [python, cpp, java]
tags: [trie, prefix_tree, strings, interview]
goal: Teach trie implementation across Python, C++, and Java with clear tracking of current node, character index, children, and terminal markers.
assets:
  trie_insert_tracker:
    type: image
    path: assets/dsa/trie/insert-tracker.png
    alt: Trie insert path with current node, character, child edge, and end marker.
lesson:
  - explain:
      title: Solve
      body: >
        Solve: Given a tree or prefix structure, solve by passing information down, collecting
        information up, or traversing in the required order.
  - compare_table:
      title: When Should This Come To Mind?
      columns:
        - When The Problem Looks Like This
        - Reach For
        - First Coding Move
      rows:
        -
          - "If the interviewer gives you root, child pointers, prefix words, ancestor relation, height, depth, or level order."
          - "A strong first thought is DFS, BFS, recursion with return value, BST bounds, trie path, or LCA."
          - "Say what each recursive call returns and what information is carried from ancestors."
        -
          - "A node answer depends on children, ancestors, or path state."
          - ""
          - ""
        -
          - "Null or terminal-node handling changes correctness."
          - ""
          - ""
  - explain:
      title: Trie Strategy
      body: >
        A trie stores strings by shared prefixes. Track node as the current trie node,
        ch as the current character, child as the next edge, and is_end as whether a
        complete word stops at this node.
  - explain:
      title: Method Strategy
      body: >
        Trie methods walk characters through shared prefix nodes. The current node
        represents the prefix already consumed, children represent next characters,
        and terminal markers distinguish a complete word from a prefix of longer
        words.

  - compare_table:
      title: Child Storage
      columns: [Approach, Best For, Caveat]
      rows:
        - ["array size 26", "lowercase a-z", "fast but fixed alphabet"]
        - ["hash map", "flexible chars", "more overhead"]
        - ["Tree map", "ordered traversal", "slower"]
  - language_lens:
      language: python
      title: Python Strategy
      body: Use dict children for clarity; defaultdict can help but explicit creation is easier to explain.
      default_instincts:
        - Use object references for nodes and lists/dicts for adjacency.
        - Name helper return values by the subtree or component summary they represent.
        - Use iterative traversal if recursion depth can be too large.
      avoid:
        - Comparing node values when identity is needed.
        - Using shared rows or adjacency lists by multiplication.
        - Forgetting to add both directions for undirected edges.
  - language_lens:
      language: cpp
      title: C++ Strategy
      body: Use array<Node*,26> or vector<Node*> for lowercase; unordered_map for flexible alphabets.
      default_instincts:
        - Check pointers before dereferencing node fields.
        - Pass adjacency and large structures by reference.
        - Use vectors for indexed graphs and maps for sparse labels.
      avoid:
        - Dereferencing nullptr.
        - Copying adjacency lists into recursive helpers.
        - Using int bounds where tree values need long long sentinels.
  - language_lens:
      language: java
      title: Java Strategy
      body: Use TrieNode[] children = new TrieNode[26] for lowercase interview problems.
      default_instincts:
        - Use null checks before reading node fields.
        - Use helper classes or methods for DSU, trie, and traversal state.
        - Initialize every inner adjacency list.
      avoid:
        - Forgetting inner-list initialization.
        - Using == for object value equality when equals is needed.
        - Mutating key objects used in maps or sets.
examples:
  - code_compare:
      title: Insert Word
      idea: Walk or create child for each ch.
      python: |
        node = root

        for ch in word:
            # Missing edge means this prefix has not existed before.
            if ch not in node.children:
                node.children[ch] = TrieNode()

            # Move down to the child representing ch.
            node = node.children[ch]

        # Mark only after the full word is consumed.
        node.is_end = True
      cpp: |
        TrieNode* node = root;

        for (char ch : word) {
            // Fixed lowercase alphabet maps 'a'..'z' to 0..25.
            int idx = ch - 'a';

            // Missing pointer means this prefix has not existed before.
            if (!node->child[idx]) node->child[idx] = new TrieNode();

            // Move down to the child representing ch.
            node = node->child[idx];
        }

        // Mark only after the full word is consumed.
        node->isEnd = true;
      java: |
        TrieNode node = root;

        for (char ch : word.toCharArray()) {
            // Fixed lowercase alphabet maps 'a'..'z' to 0..25.
            int idx = ch - 'a';

            // Missing child means this prefix has not existed before.
            if (node.child[idx] == null) node.child[idx] = new TrieNode();

            // Move down to the child representing ch.
            node = node.child[idx];
        }

        // Mark only after the full word is consumed.
        node.isEnd = true;
transitions:
  python_to_cpp:
    title: Python trie to C++ trie
    mindset_shift: [From dict children to pointer arrays for fixed alphabets.]
    habit_swaps:
      - python: "children[ch]"
        cpp: "child[ch - 'a']"
    false_friends: [{term: allocation, warning: Created C++ nodes need lifetime management, usually accepted in platform problems.}]
  python_to_java:
    title: Python trie to Java trie
    mindset_shift: [From dict children to array children or HashMap children.]
    habit_swaps:
      - python: "ch in children"
        java: "child[idx] != null"
    false_friends: []
interview_questions:
  - question: What is is_end for?
    answer: It distinguishes a complete stored word from a prefix that merely leads to longer words.
revision:
  quick_summary:
    - "Trie is a data-structure topic: know what the structure stores, which operation it makes cheap, and what caveat can break a solution."
    - "Interview working idea: node walks down characters. children store edges. is_end marks full words."
  cheat_table:
    title: Trie Cheat Table
    columns: [Variable, Meaning]
    rows:
      - ["node", "current trie node"]
      - ["ch/idx", "current edge"]
      - ["is_end", "word terminates here"]
  flashcards:
    - question: Why store children in an array of 26?
      answer: Fast fixed-lowercase indexing.
notes:
  - During a dry run, draw the path for each inserted word and mark only terminal nodes.
tlm_hooks:
  possible_tasks: [trace_trie_insert, generate_trie_drills]
  context: Focus on current node, child creation, and terminal markers.
