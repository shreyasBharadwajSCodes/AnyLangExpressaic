id: queue
title: Queue
category: dsa
level: beginner_to_intermediate
languages: [python, cpp, java]
tags: [queue, bfs, fifo, interview]
goal: Teach queue usage across Python, C++, and Java with clear tracking of frontier, front node, and enqueue timing.
assets:
  bfs_queue_tracker:
    type: image
    path: assets/dsa/queue/bfs-queue-tracker.png
    alt: BFS queue with front node, newly enqueued neighbors, and visited set.
lesson:
  - explain:
      title: Solve
      body: >
        Solve: Given a problem where the most recent unresolved item should be matched or resolved
        first, use a stack.
  - compare_table:
      title: When Should This Come To Mind?
      columns:
        - When The Problem Looks Like This
        - Reach For
        - First Coding Move
      rows:
        -
          - "   gives nested structure, previous greater or smaller, histogram boundaries, or undo-like behavior."
          - " stack or monotonic stack."
          - "Store indices when distance, width, or stale position matters; state the stack invariant."
        -
          - "The current item resolves earlier items in last-in-first-out order."
          - ""
          - ""
        -
          - "The unresolved candidates must keep a useful order."
          - ""
          - ""
  - explain:
      title: Queue Strategy
      body: >
        A queue is first-in, first-out. In BFS, q is the frontier, front/node is the
        next item to process, and neighbors are appended to the back. Mark visited
        before enqueueing to avoid duplicate queue entries.
  - explain:
      title: Method Strategy
      body: >
        Queue methods process work in first-in, first-out order. In BFS, the queue
        is the frontier, and visited timing controls duplication. The usual method is
        mark before enqueue, then pop the oldest item and expand its neighbors.

  - compare_table:
      title: Queue Operations
      columns: [Operation Needed, Python, C++, Java]
      rows:
        - ["Push back", "q.append(x)", "q.push(x)", "q.offer(x)"]
        - ["Read front", "q[0]", "q.front()", "q.peek()"]
        - ["Pop front", "q.popleft()", "q.pop()", "q.poll()"]
        - ["Empty", "not q", "q.empty()", "q.isEmpty()"]
  - language_lens:
      language: python
      title: Python Strategy
      body: Use collections.deque; list.pop(0) is O(n).
      default_instincts:
        - Use list for stack and deque for queue/deque behavior.
        - Store indices when position or staleness matters.
        - Represent heap entries as priority-payload tuples.
      behind_the_scenes: ["popleft returns the removed value."]
      avoid:
        - Using list.pop(0) for queue behavior.
        - Storing values when the algorithm needs indices.
        - Forgetting heapq is a min-heap.
  - language_lens:
      language: cpp
      title: C++ Strategy
      body: queue adapter is good for FIFO; read front before pop.
      default_instincts:
        - Use vector as a stack when you need back access or iteration.
        - Use queue/deque for FIFO and both-ended behavior.
        - Configure priority_queue for min-heap when needed.
      behind_the_scenes: ["pop returns void.", "queue is not directly iterable."]
      avoid:
        - Expecting pop to return a value.
        - Calling top/front/back on empty containers.
        - Forgetting C++ priority_queue is a max-heap by default.
  - language_lens:
      language: java
      title: Java Strategy
      body: Use ArrayDeque through Deque for BFS queues.
      default_instincts:
        - Use ArrayDeque for stack, queue, and deque patterns.
        - Use PriorityQueue for min-heap priority processing.
        - Use indices in deques for sliding-window expiration.
      behind_the_scenes: ["poll returns null when empty.", "offer appends at back."]
      avoid:
        - Using legacy Stack by habit.
        - Adding null to ArrayDeque.
        - Using subtraction comparators in PriorityQueue.
examples:
  - code_compare:
      title: BFS Skeleton
      idea: q tracks frontier and visited prevents duplicates.
      python: |
        q = deque([start])
        visited = {start}

        while q:
            # Pop the oldest frontier node.
            node = q.popleft()

            for nei in adj[node]:
                if nei not in visited:
                    # Mark before enqueue so another parent cannot enqueue nei again.
                    visited.add(nei)
                    q.append(nei)
      cpp: |
        queue<int> q;
        vector<int> visited(n);

        q.push(start);
        visited[start] = 1;

        while (!q.empty()) {
            // Read front before pop because queue::pop returns void.
            int node = q.front(); q.pop();

            for (int nei : adj[node]) {
                // Mark before enqueue so another parent cannot enqueue nei again.
                if (!visited[nei]) { visited[nei] = 1; q.push(nei); }
            }
        }
      java: |
        Deque<Integer> q = new ArrayDeque<>();
        boolean[] visited = new boolean[n];

        q.offer(start);
        visited[start] = true;

        while (!q.isEmpty()) {
            // poll removes the oldest frontier node.
            int node = q.poll();

            for (int nei : adj.get(node)) {
                // Mark before enqueue so another parent cannot enqueue nei again.
                if (!visited[nei]) { visited[nei] = true; q.offer(nei); }
            }
        }
transitions:
  python_to_cpp:
    title: Python deque queue to C++ queue
    mindset_shift: [From pop returning value to front then pop.]
    habit_swaps:
      - python: "node = q.popleft()"
        cpp: "node = q.front(); q.pop();"
    false_friends: [{term: pop, warning: C++ queue pop returns void.}]
  python_to_java:
    title: Python deque queue to Java ArrayDeque
    mindset_shift: [From popleft to poll.]
    habit_swaps:
      - python: "q.append(x)"
        java: "q.offer(x)"
    false_friends: [{term: null, warning: poll can return null on empty queues.}]
interview_questions:
  - question: Why mark visited before enqueue?
    answer: To prevent the same node from being enqueued by multiple parents.
revision:
  quick_summary:
    - "Queue is a data-structure topic: know what the structure stores, which operation it makes cheap, and what caveat can break a solution."
    - "Interview working idea: Queue is FIFO. q is frontier. node comes from front. neighbors go to back."
  cheat_table:
    title: Queue Cheat Table
    columns: [Operation Needed, Python, C++, Java]
    rows:
      - ["push", "append", "push", "offer"]
      - ["pop", "popleft", "front+pop", "poll"]
  flashcards:
    - question: Which traversal naturally uses a queue?
      answer: BFS.
notes:
  - In dry runs, draw the queue before and after each BFS level.
tlm_hooks:
  possible_tasks: [trace_bfs_queue, generate_queue_drills]
  context: Focus on frontier and visited timing.
