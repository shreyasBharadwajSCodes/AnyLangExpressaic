id: heap_priority_queue
title: Heap / Priority Queue
category: dsa
level: beginner_to_intermediate
languages: [python, cpp, java]
tags: [heap, priority_queue, top_k, shortest_path, interview]
goal: Teach heap and priority queue usage across Python, C++, and Java with clear tracking of priority, heap top, pushes, pops, and min/max direction.
assets:
  heap_top_tracker:
    type: image
    path: assets/dsa/heap_priority_queue/top-tracker.png
    alt: Heap with top priority item, pushed candidate, and popped result.
lesson:
  - explain:
      title: Solve
      body: >
        Solve: Given a problem where the most recent unresolved item should be matched or resolved
        first, use a stack.
  - compare_table:
      title: When Should This Come To Mind?
      columns:
        - When The Problem Looks Like This
        - Reach For
        - First Coding Move
      rows:
        -
          - "   gives nested structure, previous greater or smaller, histogram boundaries, or undo-like behavior."
          - " stack or monotonic stack."
          - "Store indices when distance, width, or stale position matters; state the stack invariant."
        -
          - "The current item resolves earlier items in last-in-first-out order."
          - ""
          - ""
        -
          - "The unresolved candidates must keep a useful order."
          - ""
          - ""
  - explain:
      title: Heap Strategy
      body: >
        A heap repeatedly gives the best-priority item. Track heap as pending
        candidates, top as the next chosen item, priority as the ordering value, and
        size k when solving top-k problems.
  - explain:
      title: Method Strategy
      body: >
        Heap methods repeatedly choose the best-priority item without fully sorting
        all candidates. Each entry should separate priority from payload in your
        thinking. Correctness depends on heap direction, tie fields, and discarding
        stale entries when the problem can push updated versions.

  - compare_table:
      title: Heap Defaults
      columns: [Operation Needed, Python, C++, Java]
      rows:
        - ["Default heap", "min-heap", "max-heap", "min-heap"]
        - ["Push", "heappush", "push", "offer"]
        - ["Peek", "heap[0]", "top", "peek"]
        - ["Pop", "heappop", "top then pop", "poll"]
        - ["Max heap", "negate priority", "default", "reverse comparator"]
  - language_lens:
      language: python
      title: Python Strategy
      body: heapq is a min-heap over a list; tuples naturally compare by first field then next fields.
      default_instincts:
        - Use list for stack and deque for queue/deque behavior.
        - Store indices when position or staleness matters.
        - Represent heap entries as priority-payload tuples.
      behind_the_scenes: ["Use negative values for max-heap.", "Tuple tie fields must be comparable."]
      avoid:
        - Using list.pop(0) for queue behavior.
        - Storing values when the algorithm needs indices.
        - Forgetting heapq is a min-heap.
  - language_lens:
      language: cpp
      title: C++ Strategy
      body: priority_queue is max-heap by default; use greater or custom comparator for min-heap.
      default_instincts:
        - Use vector as a stack when you need back access or iteration.
        - Use queue/deque for FIFO and both-ended behavior.
        - Configure priority_queue for min-heap when needed.
      behind_the_scenes: ["pop returns void.", "Comparator meaning can feel inverted."]
      avoid:
        - Expecting pop to return a value.
        - Calling top/front/back on empty containers.
        - Forgetting C++ priority_queue is a max-heap by default.
  - language_lens:
      language: java
      title: Java Strategy
      body: PriorityQueue is min-heap by default and uses Comparator for custom order.
      default_instincts:
        - Use ArrayDeque for stack, queue, and deque patterns.
        - Use PriorityQueue for min-heap priority processing.
        - Use indices in deques for sliding-window expiration.
      behind_the_scenes: ["poll returns best item.", "Comparator subtraction can overflow."]
      avoid:
        - Using legacy Stack by habit.
        - Adding null to ArrayDeque.
        - Using subtraction comparators in PriorityQueue.
examples:
  - code_compare:
      title: Min Heap Of Distances
      idea: Pop smallest distance first.
      python: |
        heap = []

        # Tuple order makes dist the priority and node the payload.
        heappush(heap, (dist, node))

        # The popped pair is the currently smallest distance candidate.
        dist, node = heappop(heap)
      cpp: |
        priority_queue<pair<int,int>, vector<pair<int,int>>, greater<pair<int,int>>> pq;

        // pair first field is distance, so greater<pair<...>> makes a min-heap.
        pq.push({dist, node});

        // top() reads best candidate; pop() removes it.
        auto [distNow, node] = pq.top();
        pq.pop();
      java: |
        PriorityQueue<int[]> pq = new PriorityQueue<>((a, b) -> Integer.compare(a[0], b[0]));

        // int[]{distance, node}: index 0 is the priority.
        pq.offer(new int[]{dist, node});

        // poll() returns and removes the smallest distance candidate.
        int[] cur = pq.poll();
        int distNow = cur[0], node = cur[1];
transitions:
  python_to_cpp:
    title: Python heapq to C++ priority_queue
    mindset_shift: [From min-heap default to max-heap default.]
    habit_swaps:
      - python: "heappush(heap, x)"
        cpp: "pq.push(x)"
    false_friends: [{term: default direction, warning: C++ priority_queue is max-heap by default.}]
  python_to_java:
    title: Python heapq to Java PriorityQueue
    mindset_shift: [Both default to min-heap, but Java comparator handles structured items.]
    habit_swaps:
      - python: "(dist, node)"
        java: "new int[]{dist, node}"
    false_friends: [{term: comparator, warning: Use Integer.compare instead of subtraction.}]
interview_questions:
  - question: What should priority represent?
    answer: The value that decides which candidate is processed next.
revision:
  quick_summary:
    - "Heap / Priority Queue is a data-structure topic: know what the structure stores, which operation it makes cheap, and what caveat can break a solution."
    - "Interview working idea: Python/Java default min-heap. C++ default max-heap. Track priority separately from item."
  cheat_table:
    title: Heap Cheat Table
    columns: [Operation Needed, Python, C++, Java]
    rows:
      - ["min heap", "default", "greater/custom", "default"]
      - ["max heap", "negate", "default", "reverse comparator"]
  flashcards:
    - question: What is C++ priority_queue default?
      answer: Max-heap.
notes:
  - In heap dry runs, write each entry as (priority, payload).
tlm_hooks:
  possible_tasks: [trace_heap_operations, generate_priority_queue_drills]
  context: Focus on priority/payload variables and heap direction.
