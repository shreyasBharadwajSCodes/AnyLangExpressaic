id: linked_list
title: Linked List
category: dsa
level: beginner_to_intermediate
languages: [python, cpp, java]
tags: [linked_list, pointers, references, interview]
goal: Teach linked list handling across Python, C++, and Java with clear tracking of node references, next pointers, dummy nodes, and mutation order.
assets:
  linked_list_pointer_tracker:
    type: image
    path: assets/dsa/linked_list/pointer-tracker.png
    alt: Linked list nodes with prev, curr, next, dummy, and tail pointers labeled.
lesson:
  - explain:
      title: Solve
      body: >
        Solve: Given an interview problem, choose the container whose operations match the work, then
        track the state it owns without hidden cost.
  - compare_table:
      title: When Should This Come To Mind?
      columns:
        - When The Problem Looks Like This
        - Reach For
        - First Coding Move
      rows:
        -
          - "If your problem needs storage with lookup, order, queueing, indexing, or repeated updates."
          - " container choice: array or list, hash map, set, stack, queue, deque, heap, or tree map."
          - "Name the operations you need first, then choose the structure whose costs match those operations."
        -
          - "The algorithm idea is simple but the wrong container changes complexity."
          - ""
          - ""
        -
          - "The interviewer asks how the same structure differs across Python, C++, and Java."
          - ""
          - ""
  - explain:
      title: Linked List Mental Model
      body: >
        Linked list problems are pointer-mutation problems. Track curr as the node
        being processed, prev as the node before it or reversed prefix, next_node as
        the saved original next pointer, and dummy/tail for building results.
  - explain:
      title: Method Strategy
      body: >
        Linked-list methods are reference rewiring methods. The algorithm must save
        any pointer it will need before changing next links. The usual strategy is to
        name handles such as prev, curr, next_node, dummy, and tail, then update them
        in an order that never loses the remaining list.

  - compare_table:
      title: Node Model
      columns: [Operation Needed, Python, C++, Java]
      rows:
        - ["Node reference", "object reference", "ListNode*", "ListNode reference"]
        - ["Null", "None", "nullptr", "null"]
        - ["Next field", "node.next", "node->next", "node.next"]
        - ["Dummy node", "ListNode(0)", "new ListNode(0)", "new ListNode(0)"]
  - language_lens:
      language: python
      title: Python Linked List Strategy
      body: References are object references; rebinding curr does not mutate the node, but assigning curr.next does.
      default_instincts:
        - Treat node variables as object references, not copied nodes.
        - Save next_node before changing curr.next.
        - Use dummy and tail when the result head may change.
      behind_the_scenes: ["Use is None for missing node checks.", "No manual deallocation."]
      avoid:
        - Comparing node values when the algorithm needs node identity.
        - Changing curr.next before saving the original suffix.
        - Assuming rebinding curr mutates the caller variable.
  - language_lens:
      language: cpp
      title: C++ Linked List Strategy
      body: Pointers can be null and must be checked before dereferencing.
      default_instincts:
        - Check ListNode* for nullptr before using arrow access.
        - Save nextNode before rewiring curr->next.
        - Use dummy nodes carefully and return dummy->next when building results.
      behind_the_scenes: ["node->next dereferences node.", "Ownership/deletion is usually handled by judge in interview platforms."]
      avoid:
        - Dereferencing curr or curr->next before null checks.
        - Losing ownership of the remaining suffix during rewiring.
        - Returning pointers to local stack-allocated dummy nodes incorrectly.
  - language_lens:
      language: java
      title: Java Linked List Strategy
      body: References point to node objects; changing node.next mutates the structure visible to all aliases.
      default_instincts:
        - Treat ListNode variables as references to shared node objects.
        - Save nextNode before changing curr.next.
        - Use dummy and tail references to build output lists cleanly.
      behind_the_scenes: ["null checks are required.", "GC handles unused nodes."]
      avoid:
        - Forgetting null checks before curr.next.
        - Using equals when reference identity is the algorithmic question.
        - Adding new nodes when the problem expects pointer rewiring.
examples:
  - code_compare:
      title: Reverse List
      idea: Save next before rewiring curr.next.
      python: |
        # prev is the reversed prefix; curr is the node being moved.
        prev = None
        curr = head

        while curr:
            # Save the original suffix before changing curr.next.
            next_node = curr.next

            # Reverse the pointer for this one node.
            curr.next = prev

            # Advance both handles: prev grows, curr moves to untouched suffix.
            prev = curr
            curr = next_node
      cpp: |
        // prev is the reversed prefix; curr is the node being moved.
        ListNode* prev = nullptr;
        ListNode* curr = head;

        while (curr) {
            // Save the original suffix before changing curr->next.
            ListNode* nextNode = curr->next;

            // Reverse the pointer for this one node.
            curr->next = prev;

            // Advance both handles: prev grows, curr moves to untouched suffix.
            prev = curr;
            curr = nextNode;
        }
      java: |
        // prev is the reversed prefix; curr is the node being moved.
        ListNode prev = null;
        ListNode curr = head;

        while (curr != null) {
            // Save the original suffix before changing curr.next.
            ListNode nextNode = curr.next;

            // Reverse the pointer for this one node.
            curr.next = prev;

            // Advance both handles: prev grows, curr moves to untouched suffix.
            prev = curr;
            curr = nextNode;
        }
transitions:
  python_to_cpp:
    title: Python node references to C++ pointers
    mindset_shift: [From safe object references to nullable raw pointers in platform structs.]
    habit_swaps:
      - python: "curr.next"
        cpp: "curr->next"
    false_friends:
      - term: null dereference
        warning: Check curr before curr->next.
  python_to_java:
    title: Python node references to Java references
    mindset_shift: [Very similar reference mutation model, but with explicit types and null.]
    habit_swaps:
      - python: "while curr:"
        java: "while (curr != null)"
    false_friends: []
interview_questions:
  - question: Why save next_node before changing curr.next?
    answer: Otherwise the rest of the original list can be lost.
  - question: What does dummy protect?
    answer: It gives a stable handle to the result head while tail moves.
revision:
  quick_summary:
    - "Linked List is a data-structure topic: know what the structure stores, which operation it makes cheap, and what caveat can break a solution."
    - "Interview working idea: Track curr. prev. and next_node. Check null before dereference. Dummy nodes simplify building."
  cheat_table:
    title: Linked List Cheat Table
    columns: [Operation Needed, Python, C++, Java]
    rows:
      - ["null", "None", "nullptr", "null"]
      - ["next", "node.next", "node->next", "node.next"]
      - ["loop", "while curr", "while (curr)", "while (curr != null)"]
  flashcards:
    - question: What variable prevents losing the suffix during reversal?
      answer: next_node.
notes:
  - Say out loud which pointer owns the next step before rewiring links.
tlm_hooks:
  possible_tasks: [trace_linked_list_reversal, generate_pointer_drills]
  context: Focus on node references, null checks, and mutation ordering.
