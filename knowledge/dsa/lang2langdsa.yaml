concept: data_structures_mapping

overview: >
  Core data structures appear across Python, C++, and Java with similar purposes,
  but differ in typing, mutability, memory layout, ordering guarantees, and APIs.

core_idea: >
  Map each abstract idea (array, map, set, queue, heap) to its language-specific
  implementation while adapting your mental model: Python favors simplicity,
  C++ favors performance and control, and Java favors interfaces and contracts.

languages:
  python:
    mental_model: >
      High-level, dynamic collections with minimal boilerplate. Prefer built-ins
      (list, dict, set, deque) and library helpers (Counter, defaultdict).

    think:
      - "Pick the simplest built-in that matches the access pattern."
      - "Use dict/set for O(1) average lookups."
      - "Use deque for queue/stack from both ends."
      - "Prefer readability over micro-optimizations."

    not_think:
      from_cpp:
        - "Do not reason about contiguous memory or iterator invalidation."
        - "Do not expect compile-time type guarantees."
      from_java:
        - "Do not design via interfaces for simple data holding."
        - "Do not expect verbose, strongly-typed declarations."

    responsibilities:
      - "Choose the right built-in structure."
      - "Ensure keys are hashable for dict/set."
      - "Avoid O(n) membership checks on list."
      - "Be aware of mutability side-effects."

    syntax:
      basic: |
        nums = [1, 2, 3]
        mp = {"a": 1}
        st = {1, 2, 3}

    operations:
      dynamic_array: |
        nums = [1, 2, 3]
        nums.append(4)
        x = nums[0]

      fixed_array_like: |
        t = (1, 2, 3)

      hash_map: |
        mp = {"a": 1}
        mp["b"] = 2
        v = mp.get("a")

      ordered_map_like: |
        mp = {"b": 2, "a": 1}
        for k in sorted(mp):
            pass

      set_usage: |
        st = set([1, 2, 2, 3])

      ordered_set_like: |
        st = {3, 1, 2}
        ordered = sorted(st)

      queue: |
        from collections import deque
        q = deque()
        q.append(1)
        q.popleft()

      deque: |
        from collections import deque
        d = deque([1,2])
        d.appendleft(0)
        d.append(3)

      stack: |
        s = []
        s.append(1)
        s.pop()

      heap: |
        import heapq
        h = []
        heapq.heappush(h, 1)
        heapq.heappop(h)

      linked_list_like: |
        from collections import deque
        ll = deque([1,2,3])

      frequency_map: |
        from collections import Counter
        c = Counter(["a","b","a"])

    traps:
      - "Using list for membership checks instead of set."
      - "Assuming dict is sorted by key."
      - "Using mutable objects as dict keys."
      - "Using list.pop(0) instead of deque.popleft()."

    depth:
      internals: >
        list is a dynamic array of object references. dict and set are hash tables
        with open addressing and preserve insertion order (not sorted).

      performance: >
        list index O(1), append amortized O(1), membership O(n).
        dict/set average O(1) for lookup/insert/delete.

      edge_cases:
        - "Keys must be hashable and immutable."
        - "heapq is a set of functions over list."
        - "Shallow copies can share inner mutable objects."

      advanced_patterns:
        - "defaultdict(list) for grouping."
        - "Counter for frequency and top-k."
        - "Use set for visited in graph traversals."

  cpp:
    mental_model: >
      STL offers multiple containers with explicit complexity and memory trade-offs.
      Choose based on access patterns, ordering needs, and iterator behavior.

    think:
      - "Select container by complexity and layout (vector vs list vs tree vs hash)."
      - "Prefer vector for cache-friendly contiguous storage."
      - "Use unordered_map/set for average O(1) lookup."
      - "Use map/set for sorted order and range queries."

    not_think:
      from_python:
        - "Do not expect dynamic typing or flexible mixed types."
        - "Do not ignore copying and allocation costs."
      from_java:
        - "Do not think only via interfaces."
        - "Do not rely on GC for lifetime management."

    responsibilities:
      - "Pick correct container."
      - "Manage iterator validity."
      - "Control allocations (reserve)."
      - "Understand value vs reference semantics."

    syntax:
      basic: |
        #include <vector>
        #include <unordered_map>
        #include <unordered_set>
        using namespace std;

        vector<int> nums = {1,2,3};
        unordered_map<string,int> mp;
        unordered_set<int> st;

    operations:
      dynamic_array: |
        vector<int> nums = {1,2,3};
        nums.push_back(4);
        int x = nums[0];

      fixed_array: |
        int arr[3] = {1,2,3};
        array<int,3> a = {1,2,3};

      hash_map: |
        unordered_map<string,int> mp;
        mp["a"] = 1;

      ordered_map: |
        map<string,int> mp;
        mp["a"] = 1;

      set_usage: |
        unordered_set<int> st;
        st.insert(1);

      ordered_set: |
        set<int> st;
        st.insert(1);

      queue: |
        queue<int> q;
        q.push(1);
        q.pop();

      deque: |
        deque<int> d;
        d.push_front(1);
        d.push_back(2);

      stack: |
        stack<int> s;
        s.push(1);
        s.pop();

      heap: |
        priority_queue<int> pq;
        pq.push(1);
        pq.pop();

      linked_list: |
        list<int> ll;
        ll.push_back(1);

      frequency_map: |
        unordered_map<string,int> c;
        c["a"]++;

    traps:
      - "Using map instead of unordered_map for simple lookup."
      - "Ignoring iterator invalidation on vector growth."
      - "Assuming order in unordered containers."
      - "Using list when vector is faster in practice."

    depth:
      internals: >
        vector is contiguous; deque is segmented; list is node-based;
        map/set are balanced trees; unordered_* are hash tables.

      performance: >
        vector O(1) access; unordered_map average O(1); map O(log n).
        Cache locality often makes vector outperform list.

      edge_cases:
        - "Rehash invalidates iterators in unordered containers."
        - "map operator[] inserts default values."
        - "Custom types need hash/equality or comparators."

      advanced_patterns:
        - "reserve() to avoid reallocations."
        - "emplace() to construct in place."
        - "lower_bound/upper_bound for ranges."

  java:
    mental_model: >
      Collections are interface-driven (List, Set, Map, Queue, Deque).
      Choose an implementation (ArrayList, HashMap, TreeMap, etc.) per need.

    think:
      - "Code to interfaces, instantiate implementations."
      - "Use HashMap for general lookup, TreeMap for sorted."
      - "Use ArrayDeque for stack/queue."

    not_think:
      from_python:
        - "Do not expect dynamic typing or concise literals."
        - "Do not ignore generics."
      from_cpp:
        - "Do not manage memory manually."
        - "Do not assume value semantics."

    responsibilities:
      - "Pick interface and implementation."
      - "Use generics correctly."
      - "Implement equals() and hashCode()."
      - "Understand boxing of primitives."

    syntax:
      basic: |
        import java.util.*;
        List<Integer> nums = new ArrayList<>();
        Map<String,Integer> mp = new HashMap<>();
        Set<Integer> st = new HashSet<>();

    operations:
      dynamic_array: |
        List<Integer> nums = new ArrayList<>();
        nums.add(1);
        int x = nums.get(0);

      fixed_array: |
        int[] arr = new int[]{1,2,3};

      hash_map: |
        Map<String,Integer> mp = new HashMap<>();
        mp.put("a",1);

      ordered_map: |
        Map<String,Integer> mp = new TreeMap<>();
        mp.put("a",1);

      set_usage: |
        Set<Integer> st = new HashSet<>();
        st.add(1);

      ordered_set: |
        Set<Integer> st = new TreeSet<>();
        st.add(1);

      queue: |
        Queue<Integer> q = new ArrayDeque<>();
        q.add(1);
        q.poll();

      deque: |
        Deque<Integer> d = new ArrayDeque<>();
        d.addFirst(1);
        d.addLast(2);

      stack: |
        Deque<Integer> s = new ArrayDeque<>();
        s.push(1);
        s.pop();

      heap: |
        PriorityQueue<Integer> pq = new PriorityQueue<>();
        pq.add(1);
        pq.poll();

      linked_list: |
        List<Integer> ll = new LinkedList<>();
        ll.add(1);

      frequency_map: |
        Map<String,Integer> c = new HashMap<>();
        c.put("a", c.getOrDefault("a",0)+1);

    traps:
      - "Using concrete types instead of interfaces."
      - "Forgetting equals() and hashCode()."
      - "Assuming HashMap is ordered."
      - "Using Stack instead of ArrayDeque."

    depth:
      internals: >
        Collections store object references. HashMap uses hashing,
        TreeMap/TreeSet are tree-based (red-black).

      performance: >
        ArrayList O(1) access; HashMap average O(1);
        TreeMap O(log n); LinkedList has poor cache locality.

      edge_cases:
        - "Autoboxing adds overhead."
        - "ConcurrentModificationException on unsafe iteration."
        - "Null handling varies by collection."

      advanced_patterns:
        - "Streams for transformations."
        - "computeIfAbsent for grouping."
        - "Use Comparator for custom ordering."

operations_map:
  - idea: dynamic_array
    python: |
      nums = [1,2,3]
      nums.append(4)
    cpp: |
      vector<int> nums = {1,2,3};
      nums.push_back(4);
    java: |
      List<Integer> nums = new ArrayList<>();
      nums.add(4);

  - idea: fixed_array
    python: |
      t = (1,2,3)
    cpp: |
      int arr[3] = {1,2,3};
    java: |
      int[] arr = new int[]{1,2,3};

  - idea: hash_map
    python: |
      mp = {"a":1}
    cpp: |
      unordered_map<string,int> mp;
      mp["a"] = 1;
    java: |
      Map<String,Integer> mp = new HashMap<>();
      mp.put("a",1);

  - idea: ordered_map
    python: |
      for k in sorted(mp):
          pass
    cpp: |
      map<string,int> mp;
    java: |
      Map<String,Integer> mp = new TreeMap<>();

  - idea: set
    python: |
      st = set([1,2,2])
    cpp: |
      unordered_set<int> st;
    java: |
      Set<Integer> st = new HashSet<>();

  - idea: ordered_set
    python: |
      sorted(set([3,1,2]))
    cpp: |
      set<int> st;
    java: |
      Set<Integer> st = new TreeSet<>();

  - idea: queue
    python: |
      from collections import deque
      q = deque()
      q.append(1); q.popleft()
    cpp: |
      queue<int> q;
      q.push(1); q.pop();
    java: |
      Queue<Integer> q = new ArrayDeque<>();
      q.add(1); q.poll();

  - idea: deque
    python: |
      from collections import deque
      d = deque([1,2])
      d.appendleft(0); d.append(3)
    cpp: |
      deque<int> d;
      d.push_front(0); d.push_back(3);
    java: |
      Deque<Integer> d = new ArrayDeque<>();
      d.addFirst(0); d.addLast(3);

  - idea: stack
    python: |
      s = []
      s.append(1); s.pop()
    cpp: |
      stack<int> s;
      s.push(1); s.pop();
    java: |
      Deque<Integer> s = new ArrayDeque<>();
      s.push(1); s.pop();

  - idea: heap
    python: |
      import heapq
      h=[]; heapq.heappush(h,1); heapq.heappop(h)
    cpp: |
      priority_queue<int> pq;
      pq.push(1); pq.pop();
    java: |
      PriorityQueue<Integer> pq = new PriorityQueue<>();
      pq.add(1); pq.poll();

  - idea: linked_list
    python: |
      from collections import deque
      ll = deque([1,2,3])
    cpp: |
      list<int> ll;
      ll.push_back(1);
    java: |
      List<Integer> ll = new LinkedList<>();
      ll.add(1);

  - idea: frequency_map
    python: |
      from collections import Counter
      c = Counter(["a","b","a"])
    cpp: |
      unordered_map<string,int> c;
      c["a"]++;
    java: |
      Map<String,Integer> c = new HashMap<>();
      c.put("a", c.getOrDefault("a",0)+1);

mental_shift:
  python_to_cpp: >
    Move from flexible, built-in structures to explicit container choice with
    attention to memory layout, iterator validity, and complexity.

  cpp_to_python: >
    Move from low-level control to concise, expressive built-ins and dynamic typing.

  python_to_java: >
    Move from dynamic, concise collections to interface-based, strongly-typed APIs.

  java_to_python: >
    Move from verbose interface/implementation patterns to direct literals and
    minimal boilerplate.

unique_concepts:
  python:
    - name: "dict and set as language primitives"
      description: >
        Core types with literal syntax and optimized hashing, preserving insertion order.
    - name: "Counter/defaultdict"
      description: >
        High-level utilities for counting and grouping with minimal code.

  cpp:
    - name: "STL separation of algorithms and containers"
      description: >
        Generic algorithms operate over iterators, decoupled from containers.
    - name: "value semantics and cache locality"
      description: >
        Containers like vector store values contiguously for performance.

  java:
    - name: "interface-driven collections"
      description: >
        Program to List/Set/Map interfaces and swap implementations as needed.
    - name: "generics and boxing"
      description: >
        Type safety via generics; primitives are boxed in collections.

usage:
  when_to_use:
    - "Organizing and accessing groups of data efficiently."
    - "Lookup, grouping, counting, and ordering operations."
    - "Implementing queues, stacks, and priority processing."

  when_not_to_use:
    - "When a single value or simple structure suffices."
    - "When specialized structures (e.g., tries, segment trees) are required."
    - "When strict memory constraints need custom layouts."

real_world:
  examples:
    - name: "user session tracking"
      description: >
        Use a set to keep unique active users and check membership quickly.

    - name: "word frequency analysis"
      description: >
        Use a map/dict/HashMap or Counter to count occurrences.

    - name: "task scheduling"
      description: >
        Use a queue or priority queue to process tasks in order or by priority.