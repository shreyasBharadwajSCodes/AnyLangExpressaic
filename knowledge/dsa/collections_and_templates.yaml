concept: collections

overview: >
  Collections represent data structures used to store and manage groups of values.
  Python, C++, and Java all provide similar capabilities, but they differ in design,
  abstraction, typing, and performance expectations.

core_idea: >
  The same collection idea (list, map, set, queue) exists across languages,
  but each language expects a different mental model: Python favors simplicity,
  C++ favors performance and control, and Java favors abstraction and interfaces.

languages:
  python:
    mental_model: >
      Python collections are high-level and flexible. The focus is on readability,
      ease of use, and direct expression using built-in structures.

    think:
      - "Use built-in collections like list, dict, set directly."
      - "Prefer readability over micro-optimizations."
      - "Use dict and set for fast lookup problems."

    not_think:
      from_cpp:
        - "Do not think about memory layout like vector or pointer-based containers."
        - "Do not expect compile-time type enforcement."
      from_java:
        - "Do not overuse class-based abstractions for simple data storage."
        - "Do not think in terms of interfaces like List or Map."

    responsibilities:
      - "Choose appropriate built-in collection."
      - "Avoid inefficient structures like list for membership checks."
      - "Understand mutability and hashing requirements."

    syntax:
      basic: |
        nums = [1, 2, 3]
        ages = {"Alice": 25}
        seen = set()

    operations:
      dynamic_array: |
        nums = [1, 2, 3]
        nums.append(4)
        x = nums[0]

      key_value_lookup: |
        ages = {"Alice": 25}
        ages["Bob"] = 30
        print(ages["Alice"])

      unique_values: |
        seen = set([1, 2, 2, 3])
        print(seen)

      queue_behavior: |
        from collections import deque
        q = deque()
        q.append(1)
        q.popleft()

    traps:
      - "Using list instead of set for membership checks."
      - "Using mutable objects as dictionary keys."
      - "Confusing insertion order with sorted order."

    depth:
      internals: >
        Python list is a dynamic array of references. dict and set are hash-table based.
        dict preserves insertion order but does not sort keys.

      performance: >
        List access is O(1), search is O(n). dict and set provide average O(1) lookup.
        deque provides O(1) operations at both ends.

      edge_cases:
        - "Keys must be hashable."
        - "Mutable default arguments can cause bugs."
        - "heapq is a module, not a class."

      advanced_patterns:
        - "Use defaultdict for grouping."
        - "Use Counter for frequency counting."
        - "Use set for visited tracking."

  cpp:
    mental_model: >
      C++ STL collections are explicit and performance-oriented. The programmer must
      choose containers carefully based on memory layout, complexity, and iterator behavior.

    think:
      - "Choose container based on complexity guarantees."
      - "Understand memory layout and cache behavior."
      - "Use unordered_map for fast lookup and map for sorted keys."

    not_think:
      from_python:
        - "Do not assume dynamic typing or flexible structure."
        - "Do not ignore memory and copying cost."
      from_java:
        - "Do not think only in interfaces."
        - "Do not rely on garbage collection."

    responsibilities:
      - "Choose correct container type."
      - "Manage memory and object lifetime."
      - "Understand iterator invalidation."

    syntax:
      basic: |
        vector<int> nums = {1, 2, 3};
        unordered_map<string, int> ages;
        unordered_set<int> seen;

    operations:
      dynamic_array: |
        vector<int> nums = {1, 2, 3};
        nums.push_back(4);
        int x = nums[0];

      key_value_lookup: |
        unordered_map<string, int> ages;
        ages["Alice"] = 25;

      unique_values: |
        unordered_set<int> seen;
        seen.insert(1);

      queue_behavior: |
        queue<int> q;
        q.push(1);
        q.pop();

    traps:
      - "Using map instead of unordered_map unnecessarily."
      - "Ignoring iterator invalidation after vector resize."
      - "Assuming unordered_map maintains order."

    depth:
      internals: >
        vector is contiguous memory. list is linked nodes. map/set are tree-based.
        unordered_map/set use hash tables.

      performance: >
        vector gives O(1) access. unordered_map gives average O(1) lookup.
        map gives O(log n) operations with sorted keys.

      edge_cases:
        - "Iterator invalidation after modification."
        - "Rehashing invalidates iterators."
        - "map[] inserts default values."

      advanced_patterns:
        - "Use reserve() to avoid reallocations."
        - "Use emplace() for in-place construction."
        - "Use priority_queue for greedy algorithms."

  java:
    mental_model: >
      Java collections are interface-driven. You define behavior using interfaces
      like List, Set, and Map, then select implementations like ArrayList or HashMap.

    think:
      - "Think in terms of interfaces first."
      - "Use HashMap for general lookup."
      - "Use TreeMap when sorted order is required."

    not_think:
      from_python:
        - "Do not expect concise syntax."
        - "Do not ignore type declarations."
      from_cpp:
        - "Do not manage memory manually."
        - "Do not assume value semantics."

    responsibilities:
      - "Choose correct interface and implementation."
      - "Use generics properly."
      - "Implement equals() and hashCode() correctly."

    syntax:
      basic: |
        List<Integer> nums = new ArrayList<>();
        Map<String, Integer> ages = new HashMap<>();
        Set<Integer> seen = new HashSet<>();

    operations:
      dynamic_array: |
        List<Integer> nums = new ArrayList<>();
        nums.add(1);
        int x = nums.get(0);

      key_value_lookup: |
        Map<String, Integer> ages = new HashMap<>();
        ages.put("Alice", 25);

      unique_values: |
        Set<Integer> seen = new HashSet<>();
        seen.add(1);

      queue_behavior: |
        Queue<Integer> q = new ArrayDeque<>();
        q.add(1);
        q.poll();

    traps:
      - "Using concrete types everywhere instead of interfaces."
      - "Forgetting equals() and hashCode()."
      - "Assuming HashMap is ordered."

    depth:
      internals: >
        Java collections store object references. HashMap uses hashing,
        TreeMap uses balanced trees.

      performance: >
        ArrayList provides O(1) access. HashMap gives average O(1) lookup.
        TreeMap gives O(log n) operations.

      edge_cases:
        - "Autoboxing of primitives."
        - "Null handling differs across collections."
        - "Concurrent modification exceptions."

      advanced_patterns:
        - "Use streams with collections."
        - "Use computeIfAbsent for grouping."
        - "Use PriorityQueue for heap operations."

operations_map:
  - idea: dynamic_array
    python: |
      nums = [1, 2, 3]
      nums.append(4)
    cpp: |
      vector<int> nums = {1, 2, 3};
      nums.push_back(4);
    java: |
      List<Integer> nums = new ArrayList<>();
      nums.add(4);

  - idea: key_value_lookup
    python: |
      ages = {"Alice": 25}
      print(ages["Alice"])
    cpp: |
      unordered_map<string, int> ages;
      cout << ages["Alice"];
    java: |
      Map<String, Integer> ages = new HashMap<>();
      System.out.println(ages.get("Alice"));

  - idea: unique_values
    python: |
      s = set([1,2,2])
    cpp: |
      unordered_set<int> s;
    java: |
      Set<Integer> s = new HashSet<>();

mental_shift:
  python_to_cpp: >
    Move from flexible, high-level structures to explicit container selection,
    memory awareness, and performance thinking.

  cpp_to_python: >
    Move from detailed control and optimization to simpler, more expressive,
    built-in abstractions.

  python_to_java: >
    Move from dynamic typing to explicit interfaces and generic types.

  java_to_python: >
    Move from verbose interface-based design to concise and direct collection usage.

unique_concepts:
  python:
    - name: "Counter and defaultdict"
      description: >
        Built-in high-level abstractions for counting and grouping without manual logic.

  cpp:
    - name: "Iterator-based algorithms"
      description: >
        STL separates algorithms from containers, allowing generic operations across types.

  java:
    - name: "Interface-driven collections"
      description: >
        Collections are defined by interfaces and implemented by multiple concrete classes.

usage:
  when_to_use:
    - "Storing and organizing multiple values"
    - "Performing lookup, grouping, or counting"
    - "Handling sequences or unique elements"

  when_not_to_use:
    - "When single value storage is enough"
    - "When memory constraints require specialized structures"
    - "When custom data structures are more suitable"

real_world:
  examples:
    - name: "User login tracking"
      description: >
        Use a set to track active users and prevent duplicates.

    - name: "Word frequency counter"
      description: >
        Use dict, unordered_map, or HashMap to count occurrences of words.

    - name: "Task queue"
      description: >
        Use deque, queue, or ArrayDeque to manage tasks in order.