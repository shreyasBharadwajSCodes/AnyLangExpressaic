type: animation_booklet
title: DSA Interview Animation Booklet
description: "Animation set for DSA interview patterns and important problems. Each animation includes an actual problem statement and state-focused explanation."
playlist:
  - two_sum_hash_map
  - valid_parentheses_stack
  - sliding_window_no_repeat
  - minimum_window_substring
