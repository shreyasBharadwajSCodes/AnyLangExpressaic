    title: "Two Sum: complement map"
    source_lesson: "knowledge/dsa/important_problems/warmup_and_fundamentals/two_sum.yaml"
    problem_statement: "Given an array nums and target, return indices of two numbers that add to target."
    scene:
      objects:
        -
          id: "title"
          type: "label"
          text: "Two Sum: store earlier values"
          x: 44
          y: 28
          width: 860
          size: 20
        -
          id: "problem"
          type: "label"
          text: "Problem: Given nums and target, return two indices whose values sum to target."
          x: 44
          y: 62
          width: 980
          size: 14
        -
          id: "a0"
          type: "box"
          text: 2
          x: 70
          y: 165
          width: 82
          height: 42
        -
          id: "a1"
          type: "box"
          text: 7
          x: 148
          y: 165
          width: 82
          height: 42
        -
          id: "a2"
          type: "box"
          text: 11
          x: 226
          y: 165
          width: 82
          height: 42
        -
          id: "a3"
          type: "box"
          text: 15
          x: 304
          y: 165
          width: 82
          height: 42
        -
          id: "state"
          type: "label"
          text: "State"
          x: 70
          y: 290
          width: 140
          size: 14
        -
          id: "s0"
          type: "box"
          text: ""
          x: 140
          y: 278
          width: 115
          height: 42
        -
          id: "s1"
          type: "box"
          text: ""
          x: 270
          y: 278
          width: 115
          height: 42
        -
          id: "s2"
          type: "box"
          text: ""
          x: 400
          y: 278
          width: 115
          height: 42
    steps:
      - note: "Problem: nums is [2,7,11,15], target is 9. At 2, need 7 is not seen, so store 2 with index 0."
        actions:
          - highlight: [a0, s0]
          - set_text:
              target: "s0"
              text: "seen:2->0"
      - note: "At 7, need 2 is already in seen. The answer is previous index 0 and current index 1."
        actions:
          - clear_highlight: [a0]
          - highlight: [a1, s0]
          - set_text:
              target: "s1"
              text: "need 2"
          - set_text:
              target: "s2"
              text: "ans 0,1"
          - say: "Two Sum proof: the map stores only earlier indices, so the pair uses two different positions."

