        -
          id: "s0"
          type: "box"
          text: ""
          x: 140
          y: 278
          width: 115
          height: 42
        -
          id: "s1"
          type: "box"
          text: ""
          x: 270
          y: 278
          width: 115
          height: 42
        -
          id: "s2"
          type: "box"
          text: ""
          x: 400
          y: 278
          width: 115
          height: 42
    steps:
      - note: "Problem: string is ([]). Push openers because they are waiting to be matched."
        actions:
          - highlight: [a0, a1]
          - set_text:
              target: "s0"
              text: "stack:("
          - set_text:
              target: "s1"
              text: "stack:( ["
      - note: "Read ]. It must match the most recent opener [, so pop it."
        actions:
          - clear_highlight: [a0]
          - highlight: [a2, s1]
          - set_text:
              target: "s1"
              text: "pop ["
      - note: "Read ). It matches (, stack becomes empty, so the string is valid."
        actions:
          - clear_highlight: [a2]
          - highlight: [a3, s0]
          - set_text:
              target: "s0"
              text: "empty"
          - set_text:
              target: "s2"
              text: "valid"

