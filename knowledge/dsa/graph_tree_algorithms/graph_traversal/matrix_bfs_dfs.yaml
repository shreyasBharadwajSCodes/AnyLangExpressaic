id: matrix_bfs_dfs
title: Matrix BFS And DFS
category: dsa
level: intermediate
languages:
  - python
  - cpp
  - java
tags:
  - matrix
  - grid
  - bfs
  - dfs
  - interview
goal: Teach matrix bfs and dfs across Python, C++, and Java with coordinated explanation, state tracking, and interview-ready implementation details.
assets:
  matrix_bfs_dfs_trace:
    type: image
    path: assets/dsa/matrix_bfs_dfs/matrix-bfs-dfs-trace.png
