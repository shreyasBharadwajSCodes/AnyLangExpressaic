lesson:
  - explain:
      title: Solve
      body: >
        Solve: Given nodes, edges, prerequisites, grid movement, or connectivity, model the state as a
        graph and traverse or relax edges deliberately.
  - compare_table:
      title: When Should This Come To Mind?
      columns:
        - When The Problem Looks Like This
        - Reach For
        - First Coding Move
      rows:
        -
          - "   mentions reachability, connected groups, prerequisites, shortest path, cycle, grid neighbors, or components."
          - " BFS, DFS, topological sort, union find, Dijkstra, Bellman-Ford, Floyd-Warshall, or MST."
          - "Define the graph representation, when a node becomes visited, and what each edge update means."
        -
          - "The same state can be reached from multiple directions."
          - ""
