  flashcards:
    - question: Why not use node values as graph clone keys?
      answer: Values can repeat; the original node object identity is the safer key.
    - question: What is the C++ tree-node danger line?
      answer: Reading a field through a null pointer.
notes:
  - This lesson should be read before BFS, DFS, LCA, Dijkstra, clone graph, or tree serialization.
  - When explaining code, say whether a variable is an object reference, pointer, index, or edge record.
