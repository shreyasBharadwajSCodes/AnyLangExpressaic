  - explain:
      title: Core Mental Model
      body: >
        Tree BFS uses a queue so nodes come out in breadth order. The level-size snapshot is the variable that prevents one depth from mixing with the next.
  - explain:
      title: How The Algorithm Works
      body: >
        Push the root, then while the queue has nodes, save the queue size. Pop exactly that many nodes into the current level and push their children for the next level.
  - compare_table:
      title: Variables And Decisions
      columns:
        - Variable Or Entity
        - Meaning
        - Why It Matters
      rows:
        -
          - "queue"
          - "future nodes"
          - "front is next oldest"
        -
          - "level size"
          - "current depth count"
          - "freezes the level"
