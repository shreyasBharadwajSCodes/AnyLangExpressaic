goal: Help users switch python tuple keys to java records habits under interview pressure with direct mappings, caveats, and quick code shapes.
lesson:
  - explain:
      title: Solve
      body: >
        Solve: Given a known solution in one language, translate the Python Tuple Keys To Java Records
        idea into the target language without changing the algorithm or breaking container semantics.
  - compare_table:
      title: When Should This Come To Mind?
      columns:
        - When The Problem Looks Like This
        - Reach For
        - First Coding Move
      rows:
        -
          - "If your interviewer asks why code is slow, why two versions differ, why equality fails, why overflow occurs, or how to port code across languages."
          - "A strong first thought is language mechanics, edge cases, complexity cost, and interview implementation discipline."
          - "State the hidden operation or memory behavior, then choose the safest language-specific construct."
        -
          - "The algorithm idea is known but the implementation detail can break it."
          - ""
          - ""
        -
          - "The risk sits in references, copying, numeric type, comparison, parsing, or container semantics."
          - ""
          - ""
  - explain:
      title: Drill Purpose
      body: >
        This drill is for tuple compound keys to Java records or encoded strings. The goal is not to translate syntax word by
        word; it is to preserve the same algorithmic state while using the target
        language container correctly.
  - compare_table:
      title: Translation Map
      columns:
        - Concept
        - Source Habit
        - Target Habit
        - Caveat
      rows:
        -
          - "state"
          - "compact source-language expression"
          - "explicit target-language container"
          - "immutability, equals, hashCode, and key stability"
        -
          - "missing value"
          - "often implicit"
          - "usually explicit"
          - "Handle absent keys before reading."
        -
          - "mutation"
          - "short method call"
          - "method plus type constraints"
          - "Know whether the object is copied or shared."
  - language_lens:
      language: python
      title: Python Habit To Preserve
      body: >
        Keep the algorithmic state clear: key, value, index, priority, or object identity.
      default_instincts:
        - Name the state before translating.
        - Use tuples only when immutable compound state is intended.
      avoid:
        - Assuming target containers have Python defaults.
  - language_lens:
      language: cpp
      title: C++ Target Checks
      body: >
        Check references, value copies, comparator contract, and heap direction.
      default_instincts:
        - Prefer references for large state.
        - Use find or count when absence matters.
      avoid:
        - Letting operator access create keys accidentally.
  - language_lens:
      language: java
      title: Java Target Checks
      body: >
        Check object construction, generic types, primitive arrays, Comparator helpers, and equality.
      default_instincts:
        - Use getOrDefault, computeIfAbsent, ArrayDeque, and PriorityQueue intentionally.
        - Initialize collections before mutation.
      avoid:
        - Using null results without checking.
examples:
  - code_compare:
      title: Compact State Translation
      idea: Preserve the state while changing the container syntax.
      python: |
        # State first: key maps to count.
        count[x] = count.get(x, 0) + 1
      cpp: |
        // State first: key maps to count.
        count[x]++;
      java: |
        // State first: key maps to count.
        count.put(x, count.getOrDefault(x, 0) + 1);
      note: >
        Even when syntax changes, the state sentence should stay the same.
interview_questions:
  - question: What should stay unchanged while switching languages?
    answer: The algorithmic state and invariant should stay unchanged.
  - question: What should change?
    answer: Container initialization, mutation methods, equality rules, and numeric type choices may change.
