  - language_lens:
      language: python
      title: Python Strategy
      body: >
        Keep the solution compact, but make the state variable names explicit enough for a dry run.
      default_instincts:
        - Use dictionaries, sets, deque, heapq, or lists based on the pattern.
        - Prefer tuple state for immutable compound keys.
        - Watch list aliasing and recursion depth.
      avoid:
        - Hiding an O n operation inside a loop.
        - Using mutable objects as dictionary keys.
        - Updating the answer before the state is valid.
  - language_lens:
      language: cpp
      title: C++ Strategy
      body: >
        Choose containers and numeric types deliberately, and avoid copying large state inside helpers.
      default_instincts:
        - Pass large vectors, strings, and adjacency lists by reference.
        - Use long long when counts, products, sums, or distances can grow.
        - Configure comparators and heaps explicitly.
      avoid:
        - Passing vectors by value accidentally.
        - Using unsafe int sentinels with addition.
        - Dereferencing null pointers in linked-list or tree problems.
  - language_lens:
      language: java
      title: Java Strategy
      body: >
        Use explicit arrays, initialized collections, helper methods, and safe comparator or equality choices.
      default_instincts:
        - Use primitive arrays for fixed-size state.
        - Use ArrayDeque for queues and stacks.
        - Initialize every nested collection before adding to it.
      avoid:
        - Comparator subtraction when values can be large.
        - Double equals for string value comparison.
        - Forgetting null checks on node references.
examples:
  - code_compare:
      title: Network Delay Time Core Implementation
      idea: Dijkstra shortest paths from source.
      python: |
        dist = [float("inf")] * n
        dist[src] = 0
        heap = [(0, src)]
        while heap:
            d, node = heapq.heappop(heap)
            if d != dist[node]:
                continue
            for nei, w in adj[node]:
                nd = d + w
                if nd < dist[nei]:
                    # Relaxing this edge found a shorter route to nei.
                    dist[nei] = nd
                    heapq.heappush(heap, (nd, nei))
      cpp: |
        vector<long long> dist(n, INF);
        dist[src] = 0;
        priority_queue<pair<long long,int>, vector<pair<long long,int>>, greater<pair<long long,int>>> pq;
        pq.push({0, src});
        while (!pq.empty()) {
            auto [d, node] = pq.top();
            pq.pop();
            if (d != dist[node]) continue;
            for (auto [nei, w] : adj[node]) {
                long long nd = d + w;
                if (nd < dist[nei]) {
                    // Relaxing this edge found a shorter route to nei.
                    dist[nei] = nd;
                    pq.push({nd, nei});
                }
            }
        }
      java: |
        long[] dist = new long[n];
        Arrays.fill(dist, INF);
        dist[src] = 0;
        PriorityQueue<long[]> pq = new PriorityQueue<>(Comparator.comparingLong(a -> a[0]));
        pq.offer(new long[]{0, src});
        while (!pq.isEmpty()) {
            long[] cur = pq.poll();
            long d = cur[0];
            int node = (int) cur[1];
            if (d != dist[node]) continue;
            for (int[] edge : adj.get(node)) {
                int nei = edge[0], w = edge[1];
                long nd = d + w;
                if (nd < dist[nei]) {
                    // Relaxing this edge found a shorter route to nei.
                    dist[nei] = nd;
                    pq.offer(new long[]{nd, nei});
                }
            }
        }
      note: >
        Read the code by following distance array, min heap, stale entries. The comments mark non-trivial state
        changes only, so the explanation and implementation stay coordinated.
