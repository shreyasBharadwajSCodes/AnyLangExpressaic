  - explain:
      title: When To Use This
      body: >
        Bring this idea in when the problem is quietly asking for pointer rewiring one node at a time. Before
        coding, say what the input shape is, what answer must be returned, and which
        state proves progress.
  - explain:
      title: Approach And State
      body: >
        Track previous, current, next node. The important interview move is to explain when this state
        changes, why that timing is safe, and which cases are intentionally skipped
        or resolved.
  - compare_table:
      title: Variables And Edge Cases
      columns:
