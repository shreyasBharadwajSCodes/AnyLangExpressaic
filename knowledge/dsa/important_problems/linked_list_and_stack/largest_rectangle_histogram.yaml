        - Double equals for string value comparison.
        - Forgetting null checks on node references.
examples:
  - code_compare:
      title: Largest Rectangle In Histogram Core Implementation
      idea: monotonic increasing stack finding rectangle boundaries.
      python: |
        stack = []
        best = 0
        for i, h in enumerate(heights + [0]):
            while stack and heights[stack[-1]] > h:
                height = heights[stack.pop()]
                left = stack[-1] if stack else -1
                # Current i is first smaller on right; left is first smaller on left.
                best = max(best, height * (i - left - 1))
            stack.append(i)
      cpp: |
        vector<int> st;
        int best = 0;
        for (int i = 0; i <= heights.size(); i++) {
            int h = i == heights.size() ? 0 : heights[i];
            while (!st.empty() && heights[st.back()] > h) {
                int height = heights[st.back()];
                st.pop_back();
                int left = st.empty() ? -1 : st.back();
                // Current i is first smaller on right; left is first smaller on left.
                best = max(best, height * (i - left - 1));
            }
            st.push_back(i);
        }
      java: |
        Deque<Integer> st = new ArrayDeque<>();
        int best = 0;
        for (int i = 0; i <= heights.length; i++) {
            int h = i == heights.length ? 0 : heights[i];
            while (!st.isEmpty() && heights[st.peek()] > h) {
                int height = heights[st.pop()];
                int left = st.isEmpty() ? -1 : st.peek();
                // Current i is first smaller on right; left is first smaller on left.
                best = Math.max(best, height * (i - left - 1));
            }
            st.push(i);
        }
      note: >
        Read the code by following stack of increasing bars, left boundary, right boundary. The comments mark non-trivial state
        changes only, so the explanation and implementation stay coordinated.
