  - explain:
      title: When To Use This
      body: >
        Bring this idea in when the problem is quietly asking for take or skip DP with adjacent constraint. Before
        coding, say what the input shape is, what answer must be returned, and which
        state proves progress.
  - explain:
      title: Approach And State
      body: >
        Track take state and skip state. The important interview move is to explain when this state
        changes, why that timing is safe, and which cases are intentionally skipped
        or resolved.
  - compare_table:
      title: Variables And Edge Cases
      columns:
        - Variable Or Entity
        - Meaning
        - Interview Caveat
      rows:
        -
          - "state"
          - "take state and skip state"
          - "Name this before writing code."
        -
          - "update timing"
          - "the line where progress becomes official"
          - "Most bugs happen before or after this line."
        -
          - "edge case"
          - "empty, one item, duplicates, boundary, or unreachable state"
          - "Test it after the main dry run."
  - language_lens:
      language: python
      title: Python Strategy
      body: >
        Keep the solution compact, but make the state variable names explicit enough for a dry run.
      default_instincts:
        - Use dictionaries, sets, deque, heapq, or lists based on the pattern.
        - Prefer tuple state for immutable compound keys.
        - Watch list aliasing and recursion depth.
      avoid:
        - Hiding an O n operation inside a loop.
        - Using mutable objects as dictionary keys.
        - Updating the answer before the state is valid.
  - language_lens:
      language: cpp
      title: C++ Strategy
      body: >
        Choose containers and numeric types deliberately, and avoid copying large state inside helpers.
      default_instincts:
        - Pass large vectors, strings, and adjacency lists by reference.
        - Use long long when counts, products, sums, or distances can grow.
        - Configure comparators and heaps explicitly.
      avoid:
        - Passing vectors by value accidentally.
        - Using unsafe int sentinels with addition.
        - Dereferencing null pointers in linked-list or tree problems.
  - language_lens:
      language: java
      title: Java Strategy
      body: >
        Use explicit arrays, initialized collections, helper methods, and safe comparator or equality choices.
      default_instincts:
        - Use primitive arrays for fixed-size state.
        - Use ArrayDeque for queues and stacks.
        - Initialize every nested collection before adding to it.
      avoid:
        - Comparator subtraction when values can be large.
        - Double equals for string value comparison.
        - Forgetting null checks on node references.
examples:
  - code_compare:
      title: House Robber Core Implementation
      idea: take or skip DP with adjacent constraint.
      python: |
        skip = take = 0
        for x in nums:
            # new_take robs current house, so previous house must be skipped.
            new_take = skip + x
            skip = max(skip, take)
            take = new_take
        return max(skip, take)
      cpp: |
        int skip = 0, take = 0;
        for (int x : nums) {
            // newTake robs current house, so previous house must be skipped.
            int newTake = skip + x;
            skip = max(skip, take);
            take = newTake;
        }
        return max(skip, take);
      java: |
        int skip = 0, take = 0;
        for (int x : nums) {
            // newTake robs current house, so previous house must be skipped.
            int newTake = skip + x;
            skip = Math.max(skip, take);
            take = newTake;
        }
        return Math.max(skip, take);
      note: >
        Read the code by following take state and skip state. The comments mark non-trivial state
        changes only, so the explanation and implementation stay coordinated.
interview_questions:
  - question: What is the pattern clue for House Robber?
    answer: take or skip DP with adjacent constraint.
  - question: What variables should you dry-run?
    answer: Dry-run take state and skip state, plus the answer variable and any boundary pointer.
  - question: What edge cases should you test?
    answer: Test empty or minimal input, duplicate values where relevant, boundary indices, and cases where no valid answer exists.
