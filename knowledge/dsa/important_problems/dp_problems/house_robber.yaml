lesson:
  - explain:
      title: Solve
      body: >
        Solve: Given money in a row of houses, return the maximum amount that can be robbed without
        robbing adjacent houses.
  - compare_table:
      title: When Should This Come To Mind?
      columns:
        - When The Problem Looks Like This
        - Reach For
        - First Coding Move
      rows:
        -
