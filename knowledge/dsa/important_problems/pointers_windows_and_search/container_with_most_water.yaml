  - language_lens:
      language: python
      title: Python Strategy
      body: >
        Keep the solution compact, but make the state variable names explicit enough for a dry run.
      default_instincts:
        - Use dictionaries, sets, deque, heapq, or lists based on the pattern.
        - Prefer tuple state for immutable compound keys.
        - Watch list aliasing and recursion depth.
      avoid:
        - Hiding an O n operation inside a loop.
        - Using mutable objects as dictionary keys.
        - Updating the answer before the state is valid.
  - language_lens:
      language: cpp
      title: C++ Strategy
      body: >
        Choose containers and numeric types deliberately, and avoid copying large state inside helpers.
      default_instincts:
        - Pass large vectors, strings, and adjacency lists by reference.
        - Use long long when counts, products, sums, or distances can grow.
        - Configure comparators and heaps explicitly.
      avoid:
        - Passing vectors by value accidentally.
        - Using unsafe int sentinels with addition.
        - Dereferencing null pointers in linked-list or tree problems.
  - language_lens:
      language: java
      title: Java Strategy
      body: >
        Use explicit arrays, initialized collections, helper methods, and safe comparator or equality choices.
      default_instincts:
        - Use primitive arrays for fixed-size state.
        - Use ArrayDeque for queues and stacks.
        - Initialize every nested collection before adding to it.
      avoid:
        - Comparator subtraction when values can be large.
        - Double equals for string value comparison.
        - Forgetting null checks on node references.
examples:
  - code_compare:
      title: Container With Most Water Core Implementation
      idea: two pointers moving the shorter wall.
      python: |
        left, right = 0, len(height) - 1
        best = 0
        while left < right:
            width = right - left
            best = max(best, width * min(height[left], height[right]))
            # Move the shorter wall; the taller wall cannot improve with smaller width alone.
            if height[left] < height[right]:
                left += 1
            else:
                right -= 1
      cpp: |
        int left = 0, right = height.size() - 1, best = 0;
        while (left < right) {
            int width = right - left;
            best = max(best, width * min(height[left], height[right]));
            // Move the shorter wall; the taller wall cannot improve with smaller width alone.
            if (height[left] < height[right]) left++;
            else right--;
        }
      java: |
        int left = 0, right = height.length - 1, best = 0;
        while (left < right) {
            int width = right - left;
            best = Math.max(best, width * Math.min(height[left], height[right]));
            // Move the shorter wall; the taller wall cannot improve with smaller width alone.
            if (height[left] < height[right]) left++;
            else right--;
        }
      note: >
        Read the code by following left wall, right wall, best area. The comments mark non-trivial state
        changes only, so the explanation and implementation stay coordinated.
