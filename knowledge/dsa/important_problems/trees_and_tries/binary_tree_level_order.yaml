  - language_lens:
      language: python
      title: Python Strategy
      body: >
        Keep the solution compact, but make the state variable names explicit enough for a dry run.
      default_instincts:
        - Use dictionaries, sets, deque, heapq, or lists based on the pattern.
        - Prefer tuple state for immutable compound keys.
        - Watch list aliasing and recursion depth.
      avoid:
        - Hiding an O n operation inside a loop.
        - Using mutable objects as dictionary keys.
        - Updating the answer before the state is valid.
  - language_lens:
      language: cpp
      title: C++ Strategy
      body: >
        Choose containers and numeric types deliberately, and avoid copying large state inside helpers.
      default_instincts:
        - Pass large vectors, strings, and adjacency lists by reference.
        - Use long long when counts, products, sums, or distances can grow.
        - Configure comparators and heaps explicitly.
      avoid:
        - Passing vectors by value accidentally.
        - Using unsafe int sentinels with addition.
        - Dereferencing null pointers in linked-list or tree problems.
  - language_lens:
      language: java
      title: Java Strategy
      body: >
        Use explicit arrays, initialized collections, helper methods, and safe comparator or equality choices.
      default_instincts:
        - Use primitive arrays for fixed-size state.
        - Use ArrayDeque for queues and stacks.
        - Initialize every nested collection before adding to it.
      avoid:
        - Comparator subtraction when values can be large.
        - Double equals for string value comparison.
        - Forgetting null checks on node references.
examples:
  - code_compare:
      title: Binary Tree Level Order Traversal Core Implementation
      idea: tree BFS grouped by level size.
      python: |
        q = deque([root]) if root else deque()
        levels = []
        while q:
            size = len(q)
            level = []
            for _ in range(size):
                node = q.popleft()
                level.append(node.val)
                if node.left:
                    q.append(node.left)
                if node.right:
                    q.append(node.right)
            # This append happens after exactly one level has been consumed.
            levels.append(level)
      cpp: |
        queue<TreeNode*> q;
        vector<vector<int>> levels;
        if (root != nullptr) q.push(root);
        while (!q.empty()) {
            int size = q.size();
            vector<int> level;
            for (int i = 0; i < size; i++) {
                TreeNode* node = q.front();
                q.pop();
                level.push_back(node->val);
                if (node->left != nullptr) q.push(node->left);
                if (node->right != nullptr) q.push(node->right);
            }
            // This push happens after exactly one level has been consumed.
            levels.push_back(level);
        }
      java: |
        Deque<TreeNode> q = new ArrayDeque<>();
        List<List<Integer>> levels = new ArrayList<>();
        if (root != null) q.offer(root);
        while (!q.isEmpty()) {
            int size = q.size();
            List<Integer> level = new ArrayList<>();
            for (int i = 0; i < size; i++) {
                TreeNode node = q.poll();
                level.add(node.val);
                if (node.left != null) q.offer(node.left);
                if (node.right != null) q.offer(node.right);
            }
            // This add happens after exactly one level has been consumed.
            levels.add(level);
        }
      note: >
        Read the code by following queue, current level size, level output. The comments mark non-trivial state
        changes only, so the explanation and implementation stay coordinated.
