    - analyze_solution_runtime
    - compare_language_costs
    - create_hidden_cost_drills
  context: >
    This lesson teaches time complexity discussion for DSA interviews across Python,
    C++, and Java with emphasis on hidden library costs, copying, hashing, sorting,
    and language-specific constant factors.
