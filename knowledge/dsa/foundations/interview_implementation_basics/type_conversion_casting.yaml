    - compare_cast_timing
    - create_parsing_drills
    - explain_char_numeric_mapping
  context: >
    This lesson teaches type conversion and casting across Python, C++, and Java for
    DSA interviews, focused on parsing, char arithmetic, numeric promotion, boxing,
    arrays/lists, and overflow before casting.
