            file: knowledge/dsa/python_internal_mechanics.yaml
            description: References, mutability, hashing, lists, dicts, sets, and iteration costs.
          - title: C++ Internal Mechanics
            file: knowledge/dsa/cpp_internal_mechanics.yaml
            description: Values, references, iterators, STL containers, allocation, and invalidation.
          - title: Java Internal Mechanics
