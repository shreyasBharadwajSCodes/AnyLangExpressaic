id: dsa_interview_booklet
title: DSA Interview Prep Across Languages
type: booklet
category: dsa
languages:
  - python
  - cpp
  - java
goal: A chapter-wise DSA interview prep map for quickly switching into a new interview language.

chapters:
  - id: quick_revision
    title: Quick Revision
    description: A focused route for someone who already knows DSA and wants to interview confidently in a different language.
    sections:
      - title: Language Readiness
        lessons:
          - title: Syntax Readiness For Interviews
            file: knowledge/dsa/quick_revision/syntax_readiness.yaml
            description: Loops, functions, classes, imports, lambdas, and common boilerplate.
          - title: Input Parsing Across Languages
            file: knowledge/dsa/input_parsing_across_languages.yaml
            description: Fast, reliable input parsing in Python, C++, and Java.
          - title: Print And Debug Quickly
            file: knowledge/dsa/quick_revision/print_debug_quickly.yaml
            description: How to inspect arrays, maps, pairs, objects, and nested structures fast.
          - title: Common Built-ins Cheat Sheet
            file: knowledge/dsa/common_builtins_cheat_sheet.yaml
            description: The methods and library calls most likely needed in interviews.

      - title: Containers And Patterns
        lessons:
          - title: STL vs Collections
            file: knowledge/dsa/stl_vs_collections.yaml
            description: Existing comparison lesson for C++, Python, and Java containers.
          - title: Array List Vector Readiness
            file: knowledge/dsa/arrays_lists_vectors.yaml
          - title: HashMap Dictionary Readiness
            file: knowledge/dsa/hashmap_dictionary.yaml
          - title: Stack Queue Deque Readiness
            file: knowledge/dsa/stack_queue_deque.yaml
          - title: Sorting Comparator Readiness
            file: knowledge/dsa/sorting_comparators.yaml

      - title: Must-Know Patterns
        lessons:
          - title: Two Pointers
            file: knowledge/dsa/two_pointers.yaml
          - title: Sliding Window
            file: knowledge/dsa/sliding_window.yaml
          - title: Binary Search
            file: knowledge/dsa/binary_search.yaml
          - title: BFS And DFS Readiness
            file: knowledge/dsa/bfs_dfs_readiness.yaml
          - title: Dynamic Programming Readiness
            file: knowledge/dsa/dynamic_programming_readiness.yaml

      - title: Final Interview Readiness
        lessons:
          - title: Top 50 Interview Moves
            file: knowledge/dsa/revision/top_50_interview_moves.yaml
            status: planned
          - title: Mistakes When Switching Languages
            file: knowledge/dsa/revision/language_switching_mistakes.yaml
            status: planned
          - title: Last-Minute Complexity Table
            file: knowledge/dsa/revision/last_minute_complexity_table.yaml
