  flashcards:
    - question: What does C++ unordered_map operator[] do for a missing key?
      answer: Inserts the key with a default value.
    - question: What Java methods must custom HashMap keys implement?
      answer: equals and hashCode.
    - question: Can Python list be a dict key?
      answer: No, because it is mutable and unhashable.
    - question: Which Java map preserves insertion order?
      answer: LinkedHashMap.
    - question: Which C++ map keeps keys sorted?
      answer: map.

notes:
  - Hash maps are often the difference between O(n^2) and O(n).
  - In interviews, always explain what the key represents and why it is safe to hash.

