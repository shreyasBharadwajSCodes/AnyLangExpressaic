      answer: list.pop(0).
    - question: What C++ method reads the next queue element?
      answer: front().
    - question: What Java class is usually best for stack behavior?
      answer: ArrayDeque through the Deque interface.
    - question: Does C++ stack.pop return the popped value?
      answer: No.
    - question: What does deque add over queue?
      answer: Efficient operations at both ends.

notes:
  - Pick the container by access pattern first, then syntax.
  - Many interview bugs come from empty peeks and using the wrong end of a deque.

