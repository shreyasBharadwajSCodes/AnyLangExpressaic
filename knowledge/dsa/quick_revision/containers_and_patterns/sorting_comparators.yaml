      answer: Yes.
    - question: Can int[] use Comparator in Java?
      answer: No.
    - question: What is the safe Java numeric comparison helper?
      answer: Integer.compare or Long.compare.

notes:
  - State the ordering in words before writing the comparator.
  - Most comparator bugs are equal-case, overflow, or mixing ascending and descending fields incorrectly.

