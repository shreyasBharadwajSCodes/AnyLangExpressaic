    - question: What is Python's hidden pointer-index trap?
      answer: Negative indices are valid.
    - question: What is the Java string access method?
      answer: charAt.
    - question: What is the C++ overflow-safe pair sum habit?
      answer: Cast one operand to long long before addition.

