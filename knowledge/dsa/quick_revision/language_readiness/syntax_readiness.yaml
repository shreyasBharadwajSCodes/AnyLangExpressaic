lesson:
  - explain:
      title: Solve
      body: >
        Solve: Given a timed interview problem, use Syntax Readiness For Interviews as a quick
        recognition and implementation checklist before coding.
  - compare_table:
      title: When Should This Come To Mind?
      columns:
        - When The Problem Looks Like This
        - Reach For
        - First Coding Move
      rows:
        -
          - "   asks why code is slow, why two versions differ, why equality fails, why overflow occurs, or how to port code across languages."
          - " language mechanics, edge cases, complexity cost, and interview implementation discipline."
          - "State the hidden operation or memory behavior, then choose the safest language-specific construct."
        -
          - "The algorithm idea is known but the implementation detail can break it."
          - ""
          - ""
        -
          - "The risk sits in references, copying, numeric type, comparison, parsing, or container semantics."
          - ""
          - ""
  - explain:
      title: The Interview Goal
      body: >
        Syntax readiness is not memorizing every language feature. In an interview,
        readiness means you can express loops, functions, helpers, classes, lambdas,
        imports, and container access without pausing on mechanics. The best syntax
        is usually the one that keeps the algorithm visible.
  - compare_table:
      title: Fast Mental Map
      columns:
        - Operation Needed
        - Python
        - C++
        - Java
      rows:
        - ["Main wrapper", "Usually only function body", "headers + function/class", "class Solution with method"]
        - ["Dynamic array", "list", "vector<T>", "ArrayList<T> or int[]"]
        - ["Map", "dict", "unordered_map<K,V>", "HashMap<K,V>"]
        - ["Loop values", "for x in nums", "for (int x : nums)", "for (int x : nums)"]
        - ["Loop indices", "for i in range(n)", "for (int i = 0; i < n; i++)", "for (int i = 0; i < n; i++)"]
        - ["Helper function", "def helper(...)", "auto/helper return type", "private helper method"]
        - ["Anonymous sort key", "key=lambda x: ...", "lambda comparator", "lambda Comparator or method reference"]
  - language_lens:
      language: python
      title: How Python Wants You To Move
      body: >
        Python rewards concise expression and direct use of built-ins. Lists, dicts,
        sets, tuples, comprehensions, and multiple assignment often make an interview
        solution shorter. Behind the scenes, names are references to objects. Assignment
        binds a name; it does not copy a list or dictionary.
      default_instincts:
        - Use clear helpers when logic repeats.
        - Use tuple unpacking for swaps and pair iteration.
        - Use enumerate when both index and value matter.
        - Use collections.Counter, defaultdict, deque, and heapq when they match the pattern.
      behind_the_scenes:
        - Python variables hold references to objects, so passing a list to a helper lets that helper mutate the same list.
        - Integers are arbitrary precision, so overflow is usually not the interview risk; speed and memory can be.
        - Default mutable arguments are created once, so avoid signatures like def dfs(node, path=[]).
        - Recursion depth is limited, so deep DFS may need iterative logic or recursion limit awareness.
      avoid:
        - Carrying Java-style verbose classes into simple function problems.
        - Using list membership for repeated lookup when a set is intended.
        - Mutating a list while iterating over it unless the index plan is deliberate.
  - language_lens:
      language: cpp
      title: How C++ Wants You To Move
      body: >
        C++ rewards explicit types and control over memory behavior. In interviews,
        the default container is often vector, with unordered_map, unordered_set,
        deque, queue, stack, and priority_queue nearby. Behind the scenes, values,
        references, copies, moves, and iterator invalidation matter.
      default_instincts:
        - Include the correct headers or use a contest-style include when allowed.
        - Pass large containers by reference, often const reference when read-only.
        - Use vector for contiguous dynamic arrays.
        - Use long long when sums, products, or bounds can exceed int.
      behind_the_scenes:
        - vector may reallocate on push_back, invalidating references, pointers, and iterators to its elements.
        - Passing vector<int> nums copies the whole vector; use vector<int>& or const vector<int>& when appropriate.
        - unordered_map lookup with operator[] inserts a default value for missing keys.
        - Local references and pointers must not outlive the objects they refer to.
      avoid:
        - Translating Python list habits into C++ list; C++ list is a linked list and is rarely the right interview default.
        - Forgetting semicolons and return types in helper functions.
        - Returning references to local variables.
        - Using int for prefix sums when constraints imply overflow.
  - language_lens:
      language: java
      title: How Java Wants You To Move
      body: >
        Java rewards structured method signatures, explicit types, and collection
        interfaces. In interview platforms, you usually write inside class Solution.
        Primitive arrays are fast and direct; Collections are flexible but hold object
        references and often require boxed types.
      default_instincts:
        - Use int[] for primitive arrays when size is fixed.
        - Use List<Integer>, Map<K,V>, Set<T>, Deque<T>, and PriorityQueue<T> for collections.
        - Prefer ArrayDeque over Stack for stack and queue behavior.
        - Use long when arithmetic can exceed int.
      behind_the_scenes:
        - Java passes arguments by value, but object references are copied by value; mutating the object is visible to the caller.
        - int[] stores primitive ints, while ArrayList<Integer> stores references to boxed Integer objects.
        - Custom keys in HashMap require correct equals() and hashCode().
        - String is immutable; repeated concatenation in loops can be costly, so use StringBuilder.
      avoid:
        - Using == for string or object equality.
        - Forgetting imports such as java.util.* when outside an online judge wrapper.
        - Using null-returning map calls without checking for missing keys.
        - Mixing primitive arrays and generic collections without noticing boxing costs.
  - compare_table:
      title: Syntax Choices That Change Thinking
      columns:
        - Situation
        - Interview-Safe Habit
        - Caveat
      rows:
        - ["You need helper recursion", "Keep state parameters explicit", "Python recursion limit, C++ references, Java object mutation all differ"]
        - ["You need fast lookup", "Use hash map or set", "Missing-key behavior is different in every language"]
        - ["You need sorting by custom rule", "Write comparator/key carefully", "C++/Java comparators must obey ordering contracts"]
        - ["You need mutable shared state", "Name what is shared", "Python closures, C++ references, Java fields can hide mutation"]
        - ["You need large arithmetic", "Check constraints before coding", "Python safe from overflow, C++/Java not safe with int"]

examples:
  - code_compare:
      title: Loop With Index And Value
      idea: Read both the position and the number without losing clarity.
      python: |
        for i, x in enumerate(nums):
            if x == target:
                return i
      cpp: |
        for (int i = 0; i < nums.size(); i++) {
            if (nums[i] == target) return i;
        }
      java: |
        for (int i = 0; i < nums.length; i++) {
            if (nums[i] == target) return i;
        }
      note: >
        Python's enumerate avoids manual indexing. C++ and Java usually use an
        index loop when the index is part of the answer.
  - code_compare:
      title: Helper That Does Not Copy Large Input
      idea: Count values greater than a threshold.
      python: |
        def count_gt(nums, limit):
            return sum(1 for x in nums if x > limit)
      cpp: |
        int countGt(const vector<int>& nums, int limit) {
            int count = 0;
            for (int x : nums) {
                if (x > limit) count++;
            }
            return count;
        }
      java: |
        private int countGt(int[] nums, int limit) {
            int count = 0;
            for (int x : nums) {
                if (x > limit) count++;
            }
            return count;
        }
      note: >
        The C++ const reference is the important behind-the-scenes detail: without
        it, the vector may be copied. Python and Java pass references by value, so
        the container object itself is not copied.
  - code_compare:
      title: Common Mistake With Missing Keys
      idea: Increase a frequency count.
      python: |
        freq[x] = freq.get(x, 0) + 1
      cpp: |
        freq[x]++;
      java: |
        freq.put(x, freq.getOrDefault(x, 0) + 1);
      note: >
        C++ unordered_map operator[] inserts a default value if x is absent. Python
        indexing would raise KeyError, and Java get would return null.
  - code_compare:
      title: Mutable Default Trap
      idea: Do not share one list between calls accidentally.
      python: |
        def collect(node, path=None):
            if path is None:
                path = []
            path.append(node.val)
      cpp: |
        void collect(TreeNode* node, vector<int>& path) {
            path.push_back(node->val);
        }
      java: |
        private void collect(TreeNode node, List<Integer> path) {
            path.add(node.val);
        }
      note: >
        Python default arguments are evaluated once. C++ and Java make shared mutation
        explicit through a reference or object reference.

transitions:
  python_to_cpp:
    title: Moving From Python Syntax To C++ Interview Syntax
    mindset_shift:
      - From flexible names to explicit types and return values.
      - From hidden object references to visible references, copies, and lifetimes.
      - From built-in convenience to container and header choices.
    habit_swaps:
      - python: Write def helper(nums) freely.
        cpp: Decide whether helper takes vector<int>&, const vector<int>&, or a copy.
      - python: Use dict[key] only when key exists or get when unsure.
        cpp: Remember unordered_map[key] creates a default value when missing.
      - python: Trust integer size.
        cpp: Use long long when constraints can overflow int.
    false_friends:
      - term: list
        warning: C++ list is not Python list; vector is usually the closest interview default.
      - term: reference
        warning: A C++ reference is an alias with lifetime constraints, not just a Python name binding.
  cpp_to_python:
    title: Moving From C++ Syntax To Python Interview Syntax
    mindset_shift:
      - From type declarations to readable data-flow.
      - From iterator and memory details to mutation and aliasing awareness.
      - From manual loops to built-ins when they clarify intent.
    habit_swaps:
      - cpp: Write index loops by default.
        python: Use direct iteration or enumerate unless index arithmetic matters.
      - cpp: Choose int or long long.
        python: Stop worrying about overflow, but still consider O(n) memory.
      - cpp: Separate declarations and updates.
        python: Use tuple unpacking for simple swaps and pair handling.
    false_friends:
      - term: copy
        warning: nums2 = nums aliases the same list; use nums[:] or list(nums) for a shallow copy.
      - term: for range
        warning: range(n) excludes n, matching C++ i < n loops.
  python_to_java:
    title: Moving From Python Syntax To Java Interview Syntax
    mindset_shift:
      - From function-first snippets to methods inside a class.
      - From dynamic containers to explicit primitives, arrays, and generics.
      - From Python truthiness to explicit boolean conditions.
    habit_swaps:
      - python: Use list for almost any sequence.
        java: Choose int[] for fixed primitive data or List<Integer> for growable boxed data.
      - python: Use dict.get(key, default).
        java: Use map.getOrDefault(key, default).
      - python: Compare strings with == for value equality.
        java: Use equals() for String and object value equality.
    false_friends:
      - term: pass by reference
        warning: Java passes object references by value; rebinding the parameter will not rebind the caller variable.
      - term: list
        warning: Java List is an interface; ArrayList is a common implementation.
  java_to_python:
    title: Moving From Java Syntax To Python Interview Syntax
    mindset_shift:
      - From class-heavy structure to direct algorithm expression.
      - From primitive/object type choices to mutability and aliasing choices.
      - From explicit null checks to Python's missing-key and None patterns.
    habit_swaps:
      - java: Use nums.length and nums[i].
        python: Use len(nums), nums[i], or direct iteration depending on need.
      - java: Use StringBuilder in loops.
        python: Collect parts in a list and join them for large strings.
      - java: Write helper methods with typed parameters.
        python: Write small def helpers and keep state explicit.
    false_friends:
      - term: null
        warning: Python uses None, and truthiness can hide bugs when 0 or empty containers are valid values.
      - term: object equality
        warning: Python == calls value equality behavior, while is checks identity.
  cpp_to_java:
    title: Moving From C++ Syntax To Java Interview Syntax
    mindset_shift:
      - From free functions and values to class methods and references to objects.
      - From STL templates to Java generics and collection interfaces.
      - From manual lifetime awareness to garbage-collected allocation.
    habit_swaps:
      - cpp: Use vector<int>.
        java: Use int[] for fixed primitives or List<Integer> for growable data.
      - cpp: Use pair<int,int>.
        java: Use int[] pair, a small class, or Map.Entry depending on context.
      - cpp: Use operator overloads for sorting objects.
        java: Use Comparator, Comparable, equals(), and hashCode().
    false_friends:
      - term: generic primitives
        warning: Java generics do not accept primitives, so List<int> is invalid; use List<Integer>.
      - term: char and string
        warning: Java char is UTF-16 code unit based; simple ASCII interview strings are fine, but Unicode can be deeper.
  java_to_cpp:
    title: Moving From Java Syntax To C++ Interview Syntax
    mindset_shift:
      - From references everywhere to value/reference choice at each boundary.
      - From interfaces to concrete containers with explicit guarantees.
      - From garbage collection to object lifetime and invalidation awareness.
    habit_swaps:
      - java: Pass List<Integer> and mutate it.
        cpp: Pass vector<int>& when mutation should be visible.
      - java: Use HashMap.getOrDefault.
        cpp: Use find/count when you do not want insertion, operator[] when insertion is fine.
      - java: Use long for larger arithmetic.
        cpp: Use long long and cast before multiplication if needed.
    false_friends:
      - term: reference
        warning: C++ references and pointers can dangle; Java object references do not dangle in normal managed code.
      - term: default initialization
        warning: Local primitive variables in C++ are not automatically initialized.

interview_questions:
  - question: When should you pass a C++ vector by const reference?
    answer: Pass by const vector<T>& when the helper only reads the vector and the vector may be large. This avoids copying and documents that the helper will not mutate it.
  - question: Why can a Python helper mutate a list passed by the caller?
    answer: The function receives a reference to the same list object. Rebinding the parameter is local, but mutating the object is visible outside.
  - question: Why is Java's object passing often misunderstood?
    answer: Java passes the reference value by value. A method can mutate the referred object, but assigning the parameter to a new object does not change the caller's variable.
  - question: What is the safest Java stack choice for interviews?
    answer: ArrayDeque is usually preferred over Stack because Stack is legacy and synchronized. Use push, pop, and peek on Deque.
  - question: What syntax habit prevents C++ overflow bugs?
    answer: Read constraints early, store large sums in long long, and cast before multiplication when operands are int.
  - question: What Python syntax trap appears in DFS helpers?
    answer: Mutable default arguments such as path=[] persist across calls. Use None and create the list inside the function.

revision:
  quick_summary:
    - "Syntax Readiness For Interviews is a quick revision sheet: recall the interview clue, the safe implementation move, and the language-specific trap."
    - "Working idea: Write syntax that keeps the algorithm visible. Python is concise but aliasing and mutable defaults matter. C++ is powerful but copies, references, lifetimes, and overflow matter. Java is structured but boxed types, equality, null, and collection choices matter."
  cheat_table:
    title: Interview Syntax Readiness Table
    columns:
      - Operation Needed
      - Python
      - C++
      - Java
      - Watch Out
    rows:
      - ["Fast dynamic array", "list", "vector<int>", "ArrayList<Integer>", "Java boxing, C++ reallocation"]
      - ["Fixed primitive array", "list", "vector<int> or array", "int[]", "Java int[] differs from List<Integer>"]
      - ["Read-only helper input", "normal parameter", "const vector<int>&", "int[] or List<T>", "C++ copy if passed by value"]
      - ["Hash count", "dict/get or Counter", "unordered_map[x]++", "getOrDefault + put", "Missing-key behavior differs"]
      - ["Swap two values", "a, b = b, a", "std::swap(a, b)", "temp variable", "Java has no tuple swap"]
      - ["Large sum", "int is arbitrary precision", "long long", "long", "Cast before multiplication"]
  flashcards:
    - question: Which C++ container usually matches Python list?
      answer: vector.
    - question: Does Java pass objects by reference?
      answer: No. It passes reference values by value.
    - question: What does unordered_map[key] do when key is missing?
      answer: It inserts the key with a default value.
    - question: What Python statement aliases a list instead of copying it?
      answer: other = nums.
    - question: Which Java equality operator should be avoided for String value comparison?
      answer: ==. Use equals().
    - question: What should a C++ helper use to avoid copying a read-only vector?
      answer: const vector<T>&.

notes:
  - "Interview syntax should be boring in the best way: predictable, readable, and hard to misinterpret."
  - "When switching languages, name the risk first: copy risk in C++, aliasing risk in Python, equality/null/boxing risk in Java."
  - Prefer language-natural code over literal translation.

