concept: data_structures_and_mutability

overview: >
  Data structures store collections of values. Languages differ in built-in types,
  mutability, and how collections are expressed.

levels:

  quick:
    summary: >
      Python → rich built-ins (list, dict, tuple) + dynamic + mutable/immutable mix
      C++/Java → explicit types, containers (vector, map, arrays), mutability via design

  core:
    ideas:
      - collections of values
      - ordering vs key-value mapping
      - mutability vs immutability

  deep:
    internals:
      python: >
        Built-in objects (list, dict, tuple) with dynamic typing and reference semantics.
      cpp: >
        STL containers (vector, map) and arrays; memory and type explicit.
      java: >
        Arrays and Collections Framework (ArrayList, HashMap); objects + references.

    performance:
      python: >
        Higher abstraction, some overhead, fast for prototyping.
      cpp: >
        High performance, low-level control.
      java: >
        Optimized via JVM, balanced abstraction/performance.

    edge_cases:
      - modifying mutable structures during iteration
      - copying vs referencing collections
      - immutable types cannot be changed in place

    patterns:
      - list/array traversal
      - key-value access
      - copying vs referencing

languages:

  python:

    mental_model: >
      Built-in flexible containers; choose based on structure and mutability.

    think:
      - list = ordered mutable sequence
      - dict = key-value mapping
      - tuple = immutable sequence

    not_think:
      from_cpp:
        - do not declare container types explicitly
      from_java:
        - do not rely on verbose collection setup

    responsibilities:
      - choose correct structure (list/dict/tuple)
      - understand mutability

    structures:

      list:
        mutable: true
        syntax: |
          items = [1, 2, 3]
        operations:
          add: "items.append(4)"
          access: "items[0]"

      dict:
        mutable: true
        syntax: |
          data = {"a": 1, "b": 2}
        operations:
          access: "data['a']"
          insert: "data['c'] = 3"

      tuple:
        mutable: false
        syntax: |
          t = (1, 2, 3)

    traps:
      - thinking tuple can be modified
      - confusing list vs tuple
      - modifying dict while iterating

  cpp:

    mental_model: >
      Use STL containers or arrays; explicit types and structure selection.

    think:
      - vector = dynamic array
      - array = fixed size
      - map/unordered_map = key-value store

    not_think:
      from_python:
        - do not expect built-in dict/list simplicity
        - do not assume dynamic resizing without container

    responsibilities:
      - choose correct container
      - manage types explicitly

    structures:

      vector:
        mutable: true
        syntax: |
          vector<int> v = {1, 2, 3};
        operations:
          add: "v.push_back(4)"
          access: "v[0]"

      array:
        mutable: true
        syntax: |
          int arr[3] = {1, 2, 3};

      map:
        mutable: true
        syntax: |
          map<string, int> m;
        operations:
          insert: "m['a'] = 1"
          access: "m['a']"

    traps:
      - forgetting type declarations
      - using wrong container
      - iterator invalidation

  java:

    mental_model: >
      Use arrays or Collections Framework; everything is typed.

    think:
      - array = fixed size
      - ArrayList = dynamic list
      - HashMap = key-value mapping

    not_think:
      from_python:
        - do not expect built-in flexible containers
      from_cpp:
        - do not expect pointer-level control

    responsibilities:
      - declare types
      - choose correct collection class

    structures:

      array:
        mutable: true
        syntax: |
          int[] arr = {1, 2, 3};

      arraylist:
        mutable: true
        syntax: |
          ArrayList<Integer> list = new ArrayList<>();

      hashmap:
        mutable: true
        syntax: |
          HashMap<String, Integer> map = new HashMap<>();

    traps:
      - using == for objects
      - forgetting generics
      - uninitialized collections

operations_map:

  - idea: ordered collection
    python: "list"
    cpp: "vector"
    java: "ArrayList"

  - idea: fixed collection
    python: "tuple"
    cpp: "array"
    java: "array"

  - idea: key-value mapping
    python: "dict"
    cpp: "map/unordered_map"
    java: "HashMap"

  - idea: add element
    python: "list.append(x)"
    cpp: "v.push_back(x)"
    java: "list.add(x)"

mental_shift:

  python_to_cpp: >
    Move from built-in flexible structures to explicit container selection.

  cpp_to_python: >
    Move from explicit containers to simple built-in types.

  python_to_java: >
    Move from dynamic structures to typed collection classes.

  java_to_python: >
    Move from verbose collection setup to concise built-ins.

unique_concepts:

  python:
    - name: tuple
      description: >
        Immutable sequence type not directly present in C++/Java equivalents.

  cpp:
    - name: vector
      description: >
        Dynamic array with explicit type.

  java:
    - name: collections_framework
      description: >
        Unified API for data structures.

usage:

  when_to_use:
    - storing grouped data
    - mapping keys to values
    - ordered processing

  when_not_to_use:
    - single values
    - excessive copying

thinking_progression:

  beginner:
    - collections store multiple values

  intermediate:
    - different structures serve different purposes

  advanced:
    - mutability and structure choice affect performance and correctness

real_world:

  examples:
    - name: storing user data
      description: >
        Use dict/map to store user attributes

    - name: processing lists
      description: >
        Use list/vector for sequential operations