id: two_d_dynamic_programming
title: 2D Dynamic Programming
category: dsa
level: intermediate
languages:
  - python
  - cpp
  - java
tags:
  - two_d_dp
  - grid_dp
  - dynamic_programming
  - interview
goal: Teach 2d dynamic programming across Python, C++, and Java with state definition, recurrence writing, base cases, computation order, and interview explanation.
