lesson:
  - explain:
      title: Solve
      body: >
        Solve: Given overlapping choices or repeated subproblems, define a state, transition, base case,
        and answer position.
  - compare_table:
      title: When Should This Come To Mind?
      columns:
        - When The Problem Looks Like This
        - Reach For
        - First Coding Move
      rows:
        -
          - "If your interviewer asks for count ways, min or max cost, choose or skip, subsequence, partition, or optimal value."
          - "A strong first thought is memoization, tabulation, one-dimensional DP, two-dimensional DP, knapsack, LIS, LCS, or interval DP."
          - "Write the state meaning in words before code, then verify the transition reads only already-known states."
        -
          - "The same suffix, prefix, index, capacity, or pair of indices repeats."
          - ""
          - ""
        -
          - "Greedy choice is not obviously safe."
          - ""
          - ""
  - explain:
      title: Core Mental Model
      body: >
        2D DP uses two dimensions of state. In grids they are coordinates; in strings they are prefixes of two inputs.
  - explain:
      title: How The Algorithm Works
      body: >
        Define dp at row and column. Initialize borders carefully. Fill in an order where top, left, or diagonal dependencies are ready before the current cell.
  - compare_table:
      title: Variables And Transitions
      columns:
        - Variable Or Entity
        - Meaning
        - Interview Use
      rows:
        -
          - "grid cell"
          - "best to reach coordinate"
          - "top and left dependencies"
        -
          - "string pair"
          - "prefix relation"
          - "top left diagonal"
        -
          - "base border"
          - "empty prefix or first row"
          - "prevents index errors"
  - language_lens:
      language: python
      title: Python DP Strategy
      body: >
        Python makes memoization concise and tables easy, but row aliasing, recursion depth, and mutable cache keys can break correct ideas.
      default_instincts:
        - Use lru_cache or cache for top-down DP with hashable state.
        - Use row comprehensions for two-dimensional tables.
        - Use large numeric sentinels for minimum problems.
      behind_the_scenes:
        - Cached function arguments must be hashable.
        - Multiplying nested lists aliases rows.
        - Python recursion depth can fail on long state chains.
      avoid:
        - Passing mutable lists into cached functions.
        - Rebuilding slices inside transitions.
        - Forgetting whether dp means prefix answer or suffix answer.
  - language_lens:
      language: cpp
      title: C++ DP Strategy
      body: >
        C++ DP is fast when tables are passed by reference and numeric types are chosen deliberately.
      default_instincts:
        - Use vector tables and pass them by reference.
        - Use long long for counts, costs, and sums when constraints can grow.
        - Use safe INF values and guard before adding.
      behind_the_scenes:
        - Passing vectors by value copies the table.
        - Large local arrays can overflow the stack.
        - int overflow can silently change answers.
      avoid:
        - Updating a one-dimensional table in the wrong direction.
        - Using INT_MAX and then adding a cost.
        - Copying memo tables into recursive helpers.
  - language_lens:
      language: java
      title: Java DP Strategy
      body: >
        Java DP is clearest with primitive arrays, explicit initialization, and helper methods for memoized recursion.
      default_instincts:
        - Use int arrays or long arrays for bounded states.
        - Use Arrays.fill for sentinel initialization.
        - Use helper methods with shared memo fields or parameters.
      behind_the_scenes:
        - Two-dimensional arrays are arrays of rows.
        - Integer objects allow null sentinels but add boxing.
        - Recursive DP can overflow the Java call stack.
      avoid:
        - Filling only the outer array and forgetting each row.
        - Using int when the result needs long.
        - Reallocating tables inside recursive calls.
examples:
  - code_compare:
      title: 2D Dynamic Programming Core Code Shape
      idea: Track row, column, base row, base column, and dependency direction.
      python: |
        dp = [[0] * cols for _ in range(rows)]
        dp[0][0] = grid[0][0]

        for r in range(rows):
            for c in range(cols):
                if r == 0 and c == 0:
                    continue
                best = float("inf")
                if r > 0:
                    best = min(best, dp[r - 1][c])
                if c > 0:
                    best = min(best, dp[r][c - 1])
                # dp[r][c] is the best cost to reach this cell.
                dp[r][c] = best + grid[r][c]
      cpp: |
        vector<vector<int>> dp(rows, vector<int>(cols, INF));
        dp[0][0] = grid[0][0];

        for (int r = 0; r < rows; r++) {
            for (int c = 0; c < cols; c++) {
                if (r == 0 && c == 0) continue;
                int best = INF;
                if (r > 0) best = min(best, dp[r - 1][c]);
                if (c > 0) best = min(best, dp[r][c - 1]);
                // dp[r][c] is the best cost to reach this cell.
                dp[r][c] = best + grid[r][c];
            }
        }
      java: |
        int[][] dp = new int[rows][cols];
        for (int[] row : dp) Arrays.fill(row, INF);
        dp[0][0] = grid[0][0];

        for (int r = 0; r < rows; r++) {
            for (int c = 0; c < cols; c++) {
                if (r == 0 && c == 0) continue;
                int best = INF;
                if (r > 0) best = Math.min(best, dp[r - 1][c]);
                if (c > 0) best = Math.min(best, dp[r][c - 1]);
                // dp[r][c] is the best cost to reach this cell.
                dp[r][c] = best + grid[r][c];
            }
        }
      note: >
        Read the code by first saying what each state means, then checking that every transition uses already valid smaller states.
transitions:
  python_to_cpp:
    title: Python 2D Dynamic Programming To C++
    mindset_shift:
      - Replace decorator caches with explicit memo tables or vectors.
      - Choose int, long long, and INF deliberately.
      - Pass tables and inputs by reference to avoid copying.
    habit_swaps:
      - python: Use lru_cache for recursive state.
        cpp: Use vector memo passed by reference.
    false_friends:
      - term: overflow
        warning: C++ int can overflow in counts, sums, and sentinel additions.
  python_to_java:
    title: Python 2D Dynamic Programming To Java
    mindset_shift:
      - Replace compact list setup with explicit arrays and Arrays.fill.
      - Use primitive arrays for speed when dimensions are known.
      - Keep memo state shared across helper calls.
    habit_swaps:
      - python: Use list comprehension for tables.
        java: Allocate arrays and fill each row when needed.
    false_friends:
      - term: boxed memo
        warning: Integer arrays allow null but cost more than primitive arrays with a sentinel.
interview_questions:
  - question: What clue points to 2D Dynamic Programming?
    answer: states that need two coordinates or two string positions.
  - question: What must you say before coding?
    answer: Define row, column, base row, base column, and dependency direction, then state the recurrence and base cases.
  - question: What is the common bug?
    answer: Using a transition before its dependency is ready, or changing one-dimensional update direction incorrectly.
