id: knapsack_patterns
title: Knapsack Patterns
category: dsa
level: intermediate
languages:
  - python
  - cpp
  - java
tags:
  - knapsack
  - capacity_dp
  - dynamic_programming
  - interview
goal: Teach knapsack patterns across Python, C++, and Java with state definition, recurrence writing, base cases, computation order, and interview explanation.
