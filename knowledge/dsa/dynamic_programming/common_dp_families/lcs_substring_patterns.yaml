id: lcs_substring_patterns
title: LCS And Substring Patterns
category: dsa
level: intermediate
languages:
  - python
  - cpp
  - java
tags:
  - lcs
  - substring
  - dynamic_programming
  - interview
goal: Teach lcs and substring patterns across Python, C++, and Java with state definition, recurrence writing, base cases, computation order, and interview explanation.
