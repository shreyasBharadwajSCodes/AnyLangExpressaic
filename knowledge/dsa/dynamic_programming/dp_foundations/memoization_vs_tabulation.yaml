id: memoization_vs_tabulation
title: Memoization vs Tabulation
category: dsa
level: intermediate
languages:
  - python
  - cpp
  - java
tags:
  - memoization
  - tabulation
  - dynamic_programming
  - interview
goal: Teach memoization vs tabulation across Python, C++, and Java with state definition, recurrence writing, base cases, computation order, and interview explanation.
