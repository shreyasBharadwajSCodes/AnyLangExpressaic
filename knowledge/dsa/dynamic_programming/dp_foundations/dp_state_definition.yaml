id: dp_state_definition
title: DP State Definition
category: dsa
level: intermediate
languages:
  - python
  - cpp
  - java
tags:
  - dp_state
  - recurrence
  - interview
goal: Teach dp state definition across Python, C++, and Java with state definition, recurrence writing, base cases, computation order, and interview explanation.
